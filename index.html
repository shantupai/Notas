<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif;">
    <h2>המשחק של הכפיל האדום</h2>
    <p>זוז עם החצים | הריבוע האדום אוסף כוכבים לבד</p>
    <canvas id="g" style="background:#111; border:2px solid #fff;"></canvas>

<script>
    const c = document.getElementById("g");
    const x = c.getContext("2d");
    c.width = 600; c.height = 400;

    let p = {x:50, y:350, xv:0, yv:0}; // שחקן
    let cl = {x:300, y:100}; // כפיל אדום
    let stars = [];
    let keys = {};

    // יצירת כוכבים
    for(let i=0; i<10; i++) stars.push({x: Math.random()*550, y: Math.random()*350, a:true});

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function draw() {
        // תנועה
        if(keys.ArrowRight) p.xv = 4; else if(keys.ArrowLeft) p.xv = -4; else p.xv = 0;
        p.yv += 0.5; p.x += p.xv; p.y += p.yv;
        if(p.y > 370) { p.y = 370; p.yv = 0; }
        if(keys.ArrowUp && p.y === 370) p.yv = -10;

        // הכפיל האדום מחפש כוכב
        let t = stars.find(s => s.a);
        if(t) {
            let dx = t.x - cl.x;
            let dy = t.y - cl.y;
            let d = Math.sqrt(dx*dx + dy*dy);
            cl.x += (dx/d) * 3;
            cl.y += (dy/d) * 3;
            if(d < 10) t.a = false;
        }

        // ציור הכל
        x.fillStyle = "#111"; x.fillRect(0,0,600,400);
        
        x.fillStyle = "cyan"; x.fillRect(p.x, p.y, 25, 25); // שחקן
        x.fillStyle = "red"; x.fillRect(cl.x, cl.y, 20, 20); // כפיל
        
        x.fillStyle = "yellow"; // כוכבים
        stars.forEach(s => { if(s.a) { x.beginPath(); x.arc(s.x, s.y, 5, 0, 7); x.fill(); }});

        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
