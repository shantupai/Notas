<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>עולם הפינגווין והקופים</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #333; border-radius: 8px; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 600 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

let player, stars, platforms, cursors, ladders, door, monkeys, level = 1, score = 0;

const game = new Phaser.Game(config);

function preload() {} // הכל מצויר בקוד כדי למנוע שגיאות טעינה

function create() {
    // רקע שמיים
    this.add.rectangle(400, 300, 800, 600, 0x87CEEB);

    // יצירת קבוצות
    platforms = this.physics.add.staticGroup();
    ladders = this.physics.add.staticGroup();
    monkeys = this.physics.add.group();
    stars = this.physics.add.group();

    // רצפה
    createPlatform(400, 585, 800, 30, 0x2e7d32); 

    // עצים (פלטפורמות קפיצה)
    createTree(600, 450, this);
    createTree(300, 300, this);

    // סולם
    let ladderG = this.add.graphics();
    ladderG.fillStyle(0x795548);
    ladderG.fillRect(0, 0, 40, 200);
    ladderG.lineStyle(2, 0x4e342e);
    for(let i=0; i<200; i+=20) ladderG.strokeLineShape(new Phaser.Geom.Line(0, i, 40, i));
    ladderG.generateTexture('ladderTex', 40, 200);
    ladders.create(150, 480, 'ladderTex');

    // יצירת השחקן (פינגווין)
    drawPenguin(this, 'penguinTex', 0x000000); // פינגווין שחור
    drawPenguin(this, 'cheerTex', 0x333333);  // פינגווין מעודד אפור
    
    player = this.physics.add.sprite(100, 500, 'penguinTex');
    player.setCollideWorldBounds(true);

    // פינגווין מעודד בצד
    let cheerleader = this.add.sprite(50, 550, 'cheerTex').setScale(0.8);
    this.tweens.add({ targets: cheerleader, y: 540, duration: 400, yoyo: true, repeat: -1 });

    // יצירת קופים
    drawMonkey(this);
    createMonkey(500, 530);
    createMonkey(300, 250);

    // כוכבים
    drawStar(this);
    for (let i = 0; i < 6; i++) {
        stars.create(200 + (i * 100), 100, 'starTex');
    }

    // דלת
    door = this.add.rectangle(750, 535, 50, 80, 0x5d4037);
    this.physics.add.existing(door, true);
    door.visible = false;

    // הגדרות שליטה והתנגשות
    cursors = this.input.keyboard.createCursorKeys();
    this.physics.add.collider(player, platforms);
    this.physics.add.collider(monkeys, platforms);
    this.physics.add.collider(stars, platforms);

    this.physics.add.overlap(player, stars, (p, s) => { s.destroy(); score++; if(score>=6) door.visible=true; }, null, this);
    this.physics.add.overlap(player, monkeys, () => { alert("הקוף תפס אותך!"); location.reload(); }, null, this);
    this.physics.add.overlap(player, door, () => { if(door.visible) { alert("ניצחת! עוברים לשלב הבא"); location.reload(); } }, null, this);
}

function update() {
    player.body.allowGravity = true;
    if (cursors.left.isDown) { player.setVelocityX(-180); player.setFlipX(true); }
    else if (cursors.right.isDown) { player.setVelocityX(180); player.setFlipX(false); }
    else player.setVelocityX(0);

    if (cursors.up.isDown && player.body.touching.down) player.setVelocityY(-400);

    // טיפוס
    this.physics.overlap(player, ladders, () => {
        if (cursors.up.isDown) { player.setVelocityY(-150); player.body.allowGravity = false; }
    });

    // תנועת קופים
    monkeys.children.iterate(m => {
        if (m.body.blocked.left || m.body.blocked.right) m.setData('dir', m.getData('dir') * -1);
        m.setVelocityX(80 * m.getData('dir'));
    });
}

// פונקציות עזר לציור
function createPlatform(x, y, w, h, color) {
    let g = game.scene.scenes[0].add.rectangle(x, y, w, h, color);
    game.scene.scenes[0].physics.add.existing(g, true);
    platforms.add(g);
}

function createTree(x, y, scene) {
    scene.add.rectangle(x, y + 50, 20, 100, 0x5d4037); // גזע
    let leaf = scene.add.circle(x, y, 50, 0x228B22); // עלים
    scene.physics.add.existing(leaf, true);
    platforms.add(leaf);
}

function drawPenguin(scene, key, color) {
    let g = scene.make.graphics();
    g.fillStyle(color);
    g.fillEllipse(15, 25, 30, 40); // גוף
    g.fillStyle(0xffffff);
    g.fillEllipse(15, 28, 20, 30); // בטן לבנה
    g.fillStyle(0x000000);
    g.fillCircle(10, 15, 3); g.fillCircle(20, 15, 3); // עיניים
    g.fillStyle(0xffa500);
    g.fillTriangle(12, 18, 18, 18, 15, 25); // מקור
    g.generateTexture(key, 30, 50);
}

function drawMonkey(scene) {
    let g = scene.make.graphics();
    g.fillStyle(0x795548);
    g.fillCircle(15, 15, 12); // ראש
    g.fillCircle(15, 35, 15); // גוף
    g.fillCircle(5, 10, 5); g.fillCircle(25, 10, 5); // אוזניים
    g.fillStyle(0xffccbc);
    g.fillCircle(15, 18, 8); // פנים
    g.generateTexture('monkeyTex', 30, 50);
}

function drawStar(scene) {
    let g = scene.make.graphics();
    g.fillStyle(0xffff00);
    g.fillCircle(10, 10, 8);
    g.generateTexture('starTex', 20, 20);
}

function createMonkey(x, y) {
    let m = monkeys.create(x, y, 'monkeyTex');
    m.setCollideWorldBounds(true);
    m.setData('dir', 1);
}
</script>
</body>
</html>
