<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>פינגווין ונמר - שלבים</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #fff; border-radius: 10px; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 750 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

let player1, player2, fishGroup, platforms, cursors, keys, ladders, door, monkeys;
let score = 0, currentLevel = 1, scoreText;

const game = new Phaser.Game(config);

function preload() {}

function create() {
    this.add.rectangle(400, 300, 800, 600, 0x87CEEB); // שמיים

    platforms = this.physics.add.staticGroup();
    ladders = this.physics.add.staticGroup();
    monkeys = this.physics.add.group();
    fishGroup = this.physics.add.group();

    // יצירת גרפיקה פעם אחת
    drawPenguin(this);
    drawTiger(this);
    drawMonkey(this);
    drawFish(this);

    // טקסט מצב
    scoreText = this.add.text(16, 16, 'שלב: 1 | דגים: 0/6', { fontSize: '24px', fill: '#000', fontWeight: 'bold' });

    setupLevel(this, currentLevel);

    // שחקנים
    player1 = this.physics.add.sprite(100, 500, 'penguinTex').setCollideWorldBounds(true);
    player2 = this.physics.add.sprite(150, 500, 'tigerTex').setCollideWorldBounds(true);

    // שליטה
    cursors = this.input.keyboard.createCursorKeys();
    keys = this.input.keyboard.addKeys('W,A,D');

    // התנגשויות
    this.physics.add.collider([player1, player2, monkeys], platforms);
    
    // איסוף דגים
    this.physics.add.overlap([player1, player2], fishGroup, (p, f) => {
        f.destroy();
        score++;
        updateText();
        if(score >= 6) {
            door.setAlpha(1);
            door.setFillStyle(0x00ff00); // הופך לירוק כשפתוח
        }
    }, null, this);

    // הקפצה על קופים
    this.physics.add.overlap([player1, player2], monkeys, (p, m) => {
        if (p.body.velocity.y > 0) {
            p.setVelocityY(-750);
            this.tweens.add({ targets: m, scaleY: 0.5, duration: 100, yoyo: true });
        }
    }, null, this);

    // מעבר שלב אמיתי
    this.physics.add.overlap([player1, player2], door, () => {
        if (score >= 6) {
            currentLevel++;
            score = 0;
            alert("עברת לשלב " + currentLevel + "!");
            this.scene.restart(); // מאתחל את הסצנה לשלב הבא
        }
    }, null, this);
}

function update() {
    // שחקן 1
    if (cursors.left.isDown) player1.setVelocityX(-220);
    else if (cursors.right.isDown) player1.setVelocityX(220);
    else player1.setVelocityX(0);
    if (cursors.up.isDown && player1.body.touching.down) player1.setVelocityY(-500);

    // שחקן 2
    if (keys.A.isDown) player2.setVelocityX(-220);
    else if (keys.D.isDown) player2.setVelocityX(220);
    else player2.setVelocityX(0);
    if (keys.W.isDown && player2.body.touching.down) player2.setVelocityY(-500);

    // תנועת קופים
    monkeys.children.iterate(m => {
        if (m.body.blocked.left || m.x <= 10) m.setVelocityX(120);
        else if (m.body.blocked.right || m.x >= 790) m.setVelocityX(-120);
    });
}

function setupLevel(scene, level) {
    // ניקוי
    platforms.clear(true, true);
    fishGroup.clear(true, true);
    monkeys.clear(true, true);

    // רצפה תמיד קיימת
    createPlatform(400, 585, 800, 30, 0x2e7d32);

    if (level === 1) {
        createPlatform(200, 450, 150, 20, 0xffffff);
        createPlatform(400, 320, 150, 20, 0xffffff);
        createPlatform(600, 200, 150, 20, 0xffffff);
        spawnFish([{x:200,y:400},{x:400,y:280},{x:600,y:150},{x:50,y:300},{x:750,y:400},{x:400,y:500}]);
        createMonkey(350, 530);
    } else {
        // שלב 2 - מבנה שונה
        createPlatform(100, 400, 100, 20, 0xffffff);
        createPlatform(300, 300, 100, 20, 0xffffff);
        createPlatform(500, 200, 100, 20, 0xffffff);
        createPlatform(700, 350, 100, 20, 0xffffff);
        spawnFish([{x:100,y:350},{x:300,y:250},{x:500,y:150},{x:700,y:300},{x:150,y:100},{x:650,y:100}]);
        createMonkey(200, 530);
        createMonkey(500, 530);
    }

    // יצירת דלת
    door = scene.add.rectangle(750, 535, 50, 80, 0x5d4037);
    door.setAlpha(0.5); // חצי שקוף כשנעול
    scene.physics.add.existing(door, true);
}

function updateText() {
    scoreText.setText('שלב: ' + currentLevel + ' | דגים: ' + score + '/6');
}

function spawnFish(list) {
    list.forEach(p => {
        let f = fishGroup.create(p.x, p.y, 'fishTex');
        f.body.allowGravity = false;
    });
}

function createPlatform(x, y, w, h, color) {
    let g = game.scene.scenes[0].add.rectangle(x, y, w, h, color);
    game.scene.scenes[0].physics.add.existing(g, true);
    platforms.add(g);
}

function createMonkey(x, y) {
    let m = monkeys.create(x, y, 'monkeyTex');
    m.setCollideWorldBounds(true);
    m.setVelocityX(120);
}

// גרפיקה (נשמר מהקוד הקודם)
function drawPenguin(s) {
    let g = s.make.graphics();
    g.fillStyle(0x000000); g.fillEllipse(15, 25, 30, 40);
    g.fillStyle(0xffffff); g.fillEllipse(15, 28, 20, 30);
    g.fillStyle(0xffa500); g.fillTriangle(12, 18, 18, 18, 15, 25);
    g.generateTexture('penguinTex', 30, 50);
}
function drawTiger(s) {
    let g = s.make.graphics();
    g.fillStyle(0xffa500); g.fillEllipse(15, 25, 30, 40);
    g.fillStyle(0x000000); g.fillRect(5, 15, 10, 2); g.fillRect(20, 25, 10, 2);
    g.generateTexture('tigerTex', 30, 50);
}
function drawFish(s) {
    let g = s.make.graphics();
    g.fillStyle(0x3498db); g.fillEllipse(15, 10, 25, 15);
    g.fillTriangle(0, 5, 0, 15, 10, 10);
    g.generateTexture('fishTex', 30, 20);
}
function drawMonkey(s) {
    let g = s.make.graphics();
    g.fillStyle(0x795548); g.fillCircle(15, 15, 12); g.fillCircle(15, 35, 15);
    g.fillStyle(0xffccbc); g.fillCircle(15, 18, 8);
    g.generateTexture('monkeyTex', 30, 50);
}
</script>
</body>
</html>
