<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>פינגווין בים - הרפתקת חשבון</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { border: 5px solid #fff; border-radius: 15px; }
        #math-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 25px;
            text-align: center; display: none; border: 6px solid #3498db; z-index: 10;
        }
        #math-ui input { font-size: 35px; width: 120px; text-align: center; border: 3px solid #3498db; border-radius: 10px; }
    </style>
</head>
<body>

<div id="math-ui">
    <h2 id="question" style="color: #2c3e50;">?</h2>
    <input type="number" id="answer-input" />
    <p>הקש תשובה ו-Enter</p>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800, height: 600,
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

let player, baby, fishes, bubbles, cursors;
let score = 0, level = 1, isMathActive = false, currentFish = null, correctAnswer;
let hasFish = false; // האם הפינגווין מחזיק דג כרגע?

const game = new Phaser.Game(config);

function preload() {}

function create() {
    // צבע רקע משתנה לפי שלב
    const oceanColors = [0x0fbcf9, 0x0652dd, 0x128937, 0x833471, 0x2c3e50];
    this.cameras.main.setBackgroundColor(oceanColors[(level - 1) % oceanColors.length]);

    // יצירת בועות ברקע
    bubbles = this.add.group();
    for(let i=0; i<20; i++) {
        let b = this.add.circle(Math.random()*800, Math.random()*600, Math.random()*5, 0xffffff, 0.3);
        bubbles.add(b);
    }

    drawAssets(this);

    // הגוזל (הפינגווין הקטן) - מחכה בפינה
    baby = this.physics.add.sprite(750, 50, 'baby_tex');
    this.add.text(710, 80, "הגוזל", {fontSize: '16px', fill: '#fff', backgroundColor: '#000'});

    // הפינגווין השוחה
    player = this.physics.add.sprite(100, 300, 'player_tex').setCollideWorldBounds(true);

    // דגים
    fishes = this.physics.add.group();
    spawnFishes(this);

    cursors = this.input.keyboard.createCursorKeys();

    // התנגשות עם דג
    this.physics.add.overlap(player, fishes, (p, f) => {
        if (!isMathActive && !hasFish) {
            startMath(f);
        }
    }, null, this);

    // התנגשות עם הגוזל
    this.physics.add.overlap(player, baby, () => {
        if (hasFish) {
            feedBaby();
        }
    }, null, this);

    document.getElementById('answer-input').onkeydown = (e) => { if (e.key === 'Enter') checkAns(); };
}

function update() {
    if (isMathActive) { player.setVelocity(0); return; }

    // תנועת שחייה חופשית
    const speed = 250;
    if (cursors.left.isDown) { player.setVelocityX(-speed); player.setFlipX(true); }
    else if (cursors.right.isDown) { player.setVelocityX(speed); player.setFlipX(false); }
    else player.setVelocityX(0);

    if (cursors.up.isDown) player.setVelocityY(-speed);
    else if (cursors.down.isDown) player.setVelocityY(speed);
    else player.setVelocityY(0);

    // הנפשת בועות
    bubbles.children.iterate(b => {
        b.y -= 1;
        if (b.y < -10) b.y = 610;
    });

    // אם יש דג, הוא עוקב אחרי הפינגווין
    if (hasFish && currentFish) {
        currentFish.x = player.x;
        currentFish.y = player.y;
    }
}

function spawnFishes(scene) {
    for(let i=0; i<3; i++) {
        let x = Phaser.Math.Between(100, 700);
        let y = Phaser.Math.Between(100, 500);
        fishes.create(x, y, 'fish_tex').body.allowGravity = false;
    }
}

function startMath(fish) {
    isMathActive = true;
    currentFish = fish;
    let n1 = Math.floor(Math.random() * 10) + level;
    let n2 = Math.floor(Math.random() * 10);
    correctAnswer = n1 + n2;
    document.getElementById('question').innerText = `תפסנו דג! כמה זה ${n1} + ${n2}?`;
    document.getElementById('math-ui').style.display = 'block';
    document.getElementById('answer-input').value = ''; 
    document.getElementById('answer-input').focus();
}

function checkAns() {
    let val = parseInt(document.getElementById('answer-input').value);
    if (val === correctAnswer) {
        document.getElementById('math-ui').style.display = 'none';
        isMathActive = false;
        hasFish = true; // עכשיו הפינגווין מחזיק את הדג
        currentFish.setAlpha(0.7); // הדג הופך לסימן שסוחבים אותו
        alert("נכון! עכשיו הבא את הדג לגוזל הקטן");
    } else {
        alert("טעות, נסה שוב!");
    }
}

function feedBaby() {
    hasFish = false;
    currentFish.destroy();
    currentFish = null;
    score++;
    
    if (score >= 3) {
        level++;
        alert("כל הכבוד! הגוזל שבע. עוברים לים הבא!");
        score = 0;
        game.scene.scenes[0].scene.restart();
    } else {
        alert("הגוזל אכל! נשארו עוד דגים בים.");
    }
}

function drawAssets(s) {
    // פינגווין שוחה (במבט צד/על)
    let g1 = s.make.graphics();
    g1.fillStyle(0x222222); g1.fillEllipse(20, 15, 40, 25); // גוף מאורך לשחייה
    g1.fillStyle(0xffffff); g1.fillEllipse(20, 15, 25, 15); // בטן
    g1.fillStyle(0xffa500); g1.fillTriangle(35, 12, 35, 18, 45, 15); // מקור
    g1.generateTexture('player_tex', 50, 30);

    // גוזל פינגווין
    let g2 = s.make.graphics();
    g2.fillStyle(0x777777); g2.fillCircle(15, 15, 15);
    g2.fillStyle(0xffffff); g2.fillCircle(15, 15, 8);
    g2.fillStyle(0x000000); g2.fillCircle(10, 12, 2); g2.fillCircle(20, 12, 2);
    g2.generateTexture('baby_tex', 30, 30);

    // דג
    let gf = s.make.graphics();
    gf.fillStyle(0xff7f50); gf.fillEllipse(15, 10, 25, 15);
    gf.fillTriangle(0, 5, 0, 15, 10, 10);
    gf.generateTexture('fish_tex', 30, 20);
}
</script>
</body>
</html>
