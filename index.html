<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>חשבון, חברים וכדורגל חייזרים</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { border: 5px solid #4834d4; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        #math-ui {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: #ffffff; padding: 25px; border-radius: 20px; text-align: center;
            display: none; border: 6px solid #686de0; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #math-ui h2 { font-size: 28px; color: #2f3542; margin-bottom: 15px; }
        #math-ui input { font-size: 30px; width: 100px; text-align: center; border: 3px solid #686de0; border-radius: 10px; outline: none; }
    </style>
</head>
<body>

<div id="math-ui">
    <h2 id="question">?</h2>
    <input type="number" id="answer-input" autofocus />
    <p style="color: #57606f;">הקישו תשובה ו-Enter</p>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800, height: 600,
    physics: { default: 'arcade', arcade: { gravity: { y: 850 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

let p1, p2, p3, ball, aliens, fishGroup, platforms, ladders, door, cheerleader;
let score = 0, level = 1, isMathActive = false, currentFish = null, correctAnswer;
let cursors, keys, keys2;

const game = new Phaser.Game(config);

function preload() {}

function create() {
    // רקע חלל עם "כוכבים" קטנים
    this.add.rectangle(400, 300, 800, 600, 0x0f0c29);
    for(let i=0; i<50; i++) this.add.circle(Math.random()*800, Math.random()*600, 1, 0xffffff, 0.5);

    platforms = this.physics.add.staticGroup();
    ladders = this.physics.add.staticGroup();
    aliens = this.physics.add.group();
    fishGroup = this.physics.add.group();

    // יצירת טקסטורות מושקעות
    drawDetailedCharacters(this);

    // בניית השלב
    createPlatform(400, 585, 800, 30, 0x1e272e); 
    createPlatform(250, 450, 350, 20, 0x485460);
    createPlatform(550, 300, 350, 20, 0x485460);
    createPlatform(300, 150, 300, 20, 0x485460);

    drawLadder(this, 120, 510, 140);
    drawLadder(this, 450, 370, 145);
    drawLadder(this, 180, 220, 140);

    // שחקנים
    p1 = this.physics.add.sprite(50, 530, 'p1_tex').setCollideWorldBounds(true);
    p2 = this.physics.add.sprite(100, 530, 'p2_tex').setCollideWorldBounds(true);
    p3 = this.physics.add.sprite(150, 530, 'p3_tex').setCollideWorldBounds(true);

    // מעודד
    cheerleader = this.add.container(40, 550);
    let c_body = this.add.sprite(0, 0, 'p1_tex').setScale(0.7).setTint(0x00eeee);
    let pom1 = this.add.rectangle(-15, -10, 10, 10, 0xff00ff);
    let pom2 = this.add.rectangle(15, -10, 10, 10, 0xffff00);
    cheerleader.add([c_body, pom1, pom2]);
    this.tweens.add({ targets: cheerleader, y: 530, duration: 400, yoyo: true, repeat: -1 });
    this.tweens.add({ targets: [pom1, pom2], angle: 360, duration: 500, repeat: -1 });

    // כדורגל חייזרים
    ball = this.physics.add.sprite(400, 540, 'ball_tex');
    ball.setCollideWorldBounds(true).setBounce(0.8).setDragX(50);
    
    let alien1 = createAlien(this, 300, 540);
    let alien2 = createAlien(this, 500, 540);

    // דגים
    spawnFish([{x:300,y:400}, {x:600,y:250}, {x:200,y:100}, {x:750,y:520}]);

    // דלת
    door = this.add.rectangle(750, 100, 60, 90, 0xe74c3c);
    this.physics.add.existing(door, true);
    this.add.text(725, 45, "יציאה", {fontSize:'14px', fill:'#fff', backgroundColor: '#000'});

    // שליטה
    cursors = this.input.keyboard.createCursorKeys();
    keys = this.input.keyboard.addKeys('W,A,D');
    keys2 = this.input.keyboard.addKeys('I,J,L');

    // פיזיקה
    this.physics.add.collider([p1, p2, p3, aliens, ball], platforms);
    this.physics.add.collider(aliens, aliens);
    this.physics.add.overlap([p1, p2, p3], fishGroup, (p, f) => { if (!isMathActive) startMath(f); }, null, this);
    this.physics.add.overlap([p1, p2, p3], [aliens, ball], (p, target) => { if(!p.isFunny) makeFunny(this, p); }, null, this);

    document.getElementById('answer-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') checkAns(); });
}

function update() {
    if (isMathActive) { [p1, p2, p3].forEach(p => p.setVelocity(0)); return; }

    move(p1, cursors.left, cursors.right, cursors.up);
    move(p2, keys.A, keys.D, keys.W);
    move(p3, keys2.J, keys2.L, keys2.I);

    // לוגיקת כדורגל לחייזרים
    aliens.children.iterate(a => {
        if (ball.x < a.x) a.setVelocityX(-140); else a.setVelocityX(140);
        if (Phaser.Math.Distance.Between(a.x, a.y, ball.x, ball.y) < 30) {
            ball.setVelocityY(-200);
            ball.setVelocityX(a.body.velocity.x * 2);
        }
    });
}

function move(p, l, r, u) {
    p.body.allowGravity = true;
    if (l.isDown) { p.setVelocityX(-220); p.setFlipX(true); }
    else if (r.isDown) { p.setVelocityX(220); p.setFlipX(false); }
    else p.setVelocityX(0);

    game.scene.scenes[0].physics.overlap(p, ladders, () => {
        if (u.isDown) { p.setVelocityY(-200); p.body.allowGravity = false; }
    });
    if (u.isDown && p.body.touching.down) p.setVelocityY(-480);
}

function startMath(fish) {
    isMathActive = true; currentFish = fish;
    let n1 = Math.floor(Math.random() * 10) + level;
    let n2 = Math.floor(Math.random() * 10);
    correctAnswer = n1 + n2;
    document.getElementById('question').innerText = `כמה זה ${n1} + ${n2}?`;
    document.getElementById('math-ui').style.display = 'block';
    document.getElementById('answer-input').value = ''; document.getElementById('answer-input').focus();
}

function checkAns() {
    if (parseInt(document.getElementById('answer-input').value) === correctAnswer) {
        document.getElementById('math-ui').style.display = 'none';
        isMathActive = false; currentFish.destroy();
        score++; if (score >= 4) door.setFillStyle(0x2ecc71);
    }
}

function makeFunny(scene, p) {
    p.isFunny = true;
    let originalScale = p.scale;
    p.setScale(originalScale * 2.5);
    p.setTint(0xff0000);
    scene.time.addEvent({ delay: 2000, callback: () => { p.setScale(originalScale); p.clearTint(); p.isFunny = false; }});
}

// --- גרפיקה מושקעת ---
function drawDetailedCharacters(s) {
    // פינגווין (P1)
    let g1 = s.make.graphics();
    g1.fillStyle(0x222222); g1.fillEllipse(15, 25, 30, 42); // גוף
    g1.fillStyle(0xffffff); g1.fillEllipse(15, 30, 22, 32); // בטן
    g1.fillStyle(0xffa500); g1.fillTriangle(12, 20, 18, 20, 15, 28); // מקור
    g1.generateTexture('p1_tex', 30, 50);

    // נמר (P2)
    let g2 = s.make.graphics();
    g2.fillStyle(0xe67e22); g2.fillEllipse(15, 25, 30, 42);
    g2.fillStyle(0x000000); // פסים
    for(let i=15; i<40; i+=8) g2.fillRect(5, i, 10, 3);
    g2.generateTexture('p2_tex', 30, 50);

    // פנדה (P3)
    let g3 = s.make.graphics();
    g3.fillStyle(0xffffff); g3.fillCircle(15, 25, 18); // גוף
    g3.fillStyle(0x222222); 
    g3.fillCircle(7, 12, 7); g3.fillCircle(23, 12, 7); // אוזניים
    g3.fillCircle(10, 22, 5); g3.fillCircle(20, 22, 5); // כתמי עיניים
    g3.generateTexture('p3_tex', 30, 50);

    // חייזר
    let ga = s.make.graphics();
    ga.fillStyle(0x2ecc71); ga.fillCircle(20, 20, 18);
    ga.fillStyle(0x000000); ga.fillEllipse(20, 15, 25, 12); // משקפי חלל
    ga.generateTexture('alien_tex', 40, 40);

    // כדורגל
    let gb = s.make.graphics();
    gb.fillStyle(0xffffff); gb.fillCircle(10, 10, 10);
    gb.fillStyle(0x000000); gb.fillRect(8, 8, 4, 4);
    gb.generateTexture('ball_tex', 20, 20);

    // דג
    let gf = s.make.graphics();
    gf.fillStyle(0x3498db); gf.fillEllipse(15, 10, 25, 15);
    gf.fillStyle(0xffffff); gf.fillCircle(22, 8, 2); // עין
    gf.generateTexture('fishTex', 30, 20);
}

function drawLadder(scene, x, y, h) {
    let g = scene.add.graphics();
    g.fillStyle(0xcd853f); g.fillRect(0, 0, 35, h);
    for(let i=0; i<h; i+=22) { g.fillStyle(0x5e2700); g.fillRect(0, i, 35, 5); }
    let k = 'lad'+x+y; g.generateTexture(k, 35, h); ladders.create(x, y, k); g.destroy();
}

function createPlatform(x, y, w, h, color) {
    let g = game.scene.scenes[0].add.rectangle(x, y, w, h, color);
    game.scene.scenes[0].physics.add.existing(g, true); platforms.add(g);
}

function createAlien(scene, x, y) {
    let a = aliens.create(x, y, 'alien_tex');
    a.setCollideWorldBounds(true).setBounce(0.2);
    return a;
}

function spawnFish(list) {
    list.forEach(p => { let f = fishGroup.create(p.x, p.y, 'fishTex'); f.body.allowGravity = false; });
}
</script>
</body>
</html>
