<!DOCTYPE html>
<html>
<head>
    <title>משחק הכפיל</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; }
        canvas { display: block; background: #000; margin: 20px auto; border: 4px solid #444; }
    </style>
</head>
<body>
    <div style="color:white; text-align:center; font-family:sans-serif; font-size:20px; margin-top:10px;">
        חצים כדי לזוז | הריבוע האדום הוא הכפיל שלך - הוא אוסף כוכבים לבד!
    </div>
    <canvas id="c"></canvas>

<script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    canvas.width = 800; canvas.height = 500;

    let player = { x: 50, y: 400, w: 30, h: 30, xv: 0, yv: 0 };
    // הכפיל כבר קיים ומתחיל לעבוד מיד!
    let clone = { x: 100, y: 100, w: 20, h: 20 }; 
    let stars = [];
    let keys = {};

    // יצירת כוכבים צהובים
    for(let i=0; i<10; i++) {
        stars.push({ x: Math.random()*700+50, y: Math.random()*400+50, active: true });
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        // תנועת שחקן
        if(keys.ArrowRight) player.xv = 5;
        else if(keys.ArrowLeft) player.xv = -5;
        else player.xv = 0;
        
        player.yv += 0.5; // גרביטציה
        player.x += player.xv;
        player.y += player.yv;

        // עצירה על הרצפה
        if(player.y > 450) { player.y = 450; player.yv = 0; }
        if(keys.ArrowUp && player.y === 450) player.yv = -12;

        // לוגיקת כפיל (ה-AI)
        let target = stars.find(s => s.active);
        if(target) {
            let dx = target.x - clone.x;
            let dy = target.y - clone.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            clone.x += (dx/dist) * 4;
            clone.y += (dy/dist) * 4;
            if(dist < 15) target.active = false;
        }

        // ציור
        ctx.fillStyle = "black";
        ctx.fillRect(0,0,800,500);

        // שחקן (כחול)
        ctx.fillStyle = "cyan";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // כפיל (אדום)
        ctx.fillStyle = "red";
        ctx.fillRect(clone.x, clone.y, clone.w, clone.h);

        // כוכבים (צהוב)
        ctx.fillStyle = "yellow";
        stars.forEach(s => {
            if(s.active) {
                ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, 7); ctx.fill();
            }
        });

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
