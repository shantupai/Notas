<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: white; text-align: center; }
        canvas { background: #111; border: 3px solid #444; display: block; margin: 20px auto; }
    </style>
</head>
<body>
    <h3>המשחק המלא: חצים לזוז | הכפיל האדום כבר כאן ואוסף כוכבים!</h3>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 800; canvas.height = 400;

    // שחקן
    let player = { x: 50, y: 350, w: 25, h: 25, xv: 0, yv: 0, jumps: 0 };
    // כפיל - הוא כבר כאן!
    let clone = { x: 400, y: 200, w: 20, h: 20 };
    // קירות ופלטפורמות
    let walls = [{ x: 300, y: 150, w: 30, h: 200 }];
    let platforms = [{ x: 0, y: 380, w: 800, h: 20 }, { x: 100, y: 280, w: 100, h: 10 }];
    // כוכבים
    let stars = [];
    for(let i=0; i<8; i++) stars.push({ x: Math.random()*700+50, y: Math.random()*300+50, active: true });

    let keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        // תנועת שחקן
        if(keys.ArrowRight) player.xv = 5; else if(keys.ArrowLeft) player.xv = -5; else player.xv = 0;
        
        // טיפוס קירות (Wall Jump)
        let onWall = false;
        walls.forEach(w => {
            if(player.x + player.w > w.x && player.x < w.x + w.w && player.y + player.h > w.y && player.y < w.y + w.h) {
                onWall = true;
                player.yv = 1; // החלקה על קיר
            }
        });

        if(!onWall) player.yv += 0.5; // גרביטציה רגילה
        player.x += player.xv; player.y += player.yv;

        // התנגשות רצפה
        platforms.forEach(p => {
            if(player.x < p.x+p.w && player.x+player.w > p.x && player.y+player.h > p.y && player.y+player.h < p.y+p.h+10 && player.yv >= 0) {
                player.y = p.y - player.h; player.yv = 0;
            }
        });

        if(keys.Space && (player.yv === 0 || onWall)) player.yv = -10;

        // הכפיל האדום - בינה מלאכותית
        let target = stars.find(s => s.active);
        if(target) {
            let dx = target.x - clone.x, dy = target.y - clone.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            clone.x += (dx/dist) * 4; clone.y += (dy/dist) * 4;
            if(dist < 15) target.active = false;
        }

        // ציור
        ctx.fillStyle = "black"; ctx.fillRect(0,0,800,400);
        ctx.fillStyle = "gray"; walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
        ctx.fillStyle = "darkgray"; platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
        
        ctx.fillStyle = "cyan"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = "red"; ctx.fillRect(clone.x, clone.y, clone.w, clone.h);
        
        ctx.fillStyle = "yellow";
        stars.forEach(s => { if(s.active) { ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, 7); ctx.fill(); }});

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
