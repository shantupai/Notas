<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>משחק הכוכב האדום</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { display: block; background: #000; border: 2px solid #444; margin: 10px auto; }
        #info { text-align: center; font-size: 20px; }
    </style>
</head>
<body>
    <div id="info">ניקוד: <span id="score">0</span> | סטטוס כפיל: <span id="status">כבוי</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 800;
    canvas.height = 500;

    let score = 0;
    let keys = {};
    
    // שחקן
    let player = { x: 50, y: 400, w: 30, h: 30, dy: 0, speed: 5, jumpPower: -12, grounded: false };
    
    // כוכב אדום (הבונוס)
    let redStar = { x: 200, y: 450, r: 15, active: true };
    
    // כפיל (מתחיל כ-null)
    let clone = null;
    
    // כוכבים צהובים
    let stars = [
        { x: 400, y: 300, active: true },
        { x: 600, y: 200, active: true },
        { x: 100, y: 150, active: true },
        { x: 700, y: 400, active: true }
    ];

    window.addEventListener("keydown", e => keys[e.code] = true);
    window.addEventListener("keyup", e => keys[e.code] = false);

    function update() {
        // תנועת שחקן
        if (keys["ArrowRight"]) player.x += player.speed;
        if (keys["ArrowLeft"]) player.x -= player.speed;
        
        // קפיצה וגרביטציה
        if (keys["Space"] && player.grounded) {
            player.dy = player.jumpPower;
            player.grounded = false;
        }
        
        player.dy += 0.6; // גרביטציה
        player.y += player.dy;
        
        // התנגשות ברצפה
        if (player.y + player.h > canvas.height - 20) {
            player.y = canvas.height - 20 - player.h;
            player.dy = 0;
            player.grounded = true;
        }

        // בדיקה אם השחקן נוגע בכוכב האדום
        if (redStar.active && Math.hypot(player.x - redStar.x, player.y - redStar.y) < 30) {
            redStar.active = false;
            clone = { x: player.x, y: player.y, w: 20, h: 20 };
            document.getElementById("status").innerText = "פעיל!";
        }

        // לוגיקת כפיל (זז לבד לכוכבים)
        if (clone) {
            let target = stars.find(s => s.active); // מוצא את הכוכב הפעיל הראשון
            if (target) {
                let dx = target.x - clone.x;
                let dy = target.y - clone.y;
                let dist = Math.hypot(dx, dy);
                
                // תנועה חלקה לכיוון הכוכב
                clone.x += (dx / dist) * 4;
                clone.y += (dy / dist) * 4;
                
                // אם הכפיל הגיע לכוכב
                if (dist < 10) {
                    target.active = false;
                    score += 10;
                    document.getElementById("score").innerText = score;
                }
            }
        }

        // איסוף כוכבים ע"י השחקן
        stars.forEach(s => {
            if (s.active && Math.hypot(player.x - s.x, player.y - s.y) < 30) {
                s.active = false;
                score += 10;
                document.getElementById("score").innerText = score;
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // רצפה
        ctx.fillStyle = "#555";
        ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

        // שחקן (כחול)
        ctx.fillStyle = "cyan";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // כוכב אדום
        if (redStar.active) {
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(redStar.x, redStar.y, redStar.r, 0, Math.PI * 2);
            ctx.fill();
        }

        // כפיל (אדום)
        if (clone) {
            ctx.fillStyle = "red";
            ctx.fillRect(clone.x, clone.y, clone.w, clone.h);
        }

        // כוכבים צהובים
        ctx.fillStyle = "yellow";
        stars.forEach(s => {
            if (s.active) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    draw();
</script>
</body>
</html>
