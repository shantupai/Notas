<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - 50 שלבים משתנים + בוסים</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; margin: 0 auto; background: #0f172a; border-bottom: 5px solid #1e293b; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px #000; }
        #quiz { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                background: white; color: black; padding: 30px; border-radius: 20px; text-align: center; z-index: 100; box-shadow: 0 0 50px red; }
        button { padding: 15px; margin: 10px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 18px; width: 100%; }
    </style>
</head>
<body>
    <div id="ui">
        <div>🚀 שלב: <span id="lvl">1</span></div>
        <div id="boss-ui" style="color: #ff4444; display: none;">👿 חיים לבוס: <span id="boss-hp">100</span>%</div>
        <div>✨ כוכבים: <span id="sc">0</span></div>
    </div>
    <div id="quiz"><h2 id="q">חידה!</h2><div id="opts"></div></div>
    <canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let level = 1, score = 0, gameActive = true, lasersOn = true;
    let currentLevelData = null;
    
    const player = { x: 50, y: 0, w: 30, h: 30, xv: 0, yv: 0, speed: 6, jump: 12, grav: 0.6 };
    const keys = {};

    const riddles = [
        { q: "מה שייך לך אבל אחרים משתמשים בו יותר?", o: ["שם", "כסף", "סוד"], c: 0 },
        { q: "מה רץ בלי רגליים?", o: ["זמן", "מים", "רוח"], c: 1 },
        { q: "מה נשבר כשמדברים עליו?", o: ["זכוכית", "שקט", "לב"], c: 1 },
        { q: "איזה חודש יש בו 28 ימים?", o: ["פברואר", "כולם", "מרץ"], c: 1 }
    ];

    // פונקציה שבונה שלב חדש לגמרי בכל פעם שקוראים לה
    function createNewLevel(lvlNum) {
        const isBoss = lvlNum % 10 === 0;
        document.getElementById('boss-ui').style.display = isBoss ? 'block' : 'none';
        
        let data = {
            isBoss: isBoss,
            bossHp: 100,
            color: `hsl(${Math.random() * 360}, 40%, 15%)`,
            plats: [{x: 0, y: canvas.height - 40, w: canvas.width, h: 40}], // רצפה
            aliens: [],
            lasers: [],
            btns: [],
            door: { x: canvas.width - 80, y: canvas.height - 120, w: 50, h: 80 }
        };

        if (isBoss) {
            // שלב בוס: בוס ענקי באמצע
            data.boss = { x: canvas.width/2 - 50, y: 100, w: 150, h: 150, speed: 3 + (lvlNum/20) };
            data.plats.push({x: 200, y: 400, w: 200, h: 20}, {x: canvas.width-400, y: 400, w: 200, h: 20});
        } else {
            // שלב רגיל: הגרלת פלטפורמות
            for (let i = 0; i < 6; i++) {
                data.plats.push({
                    x: Math.random() * (canvas.width - 200),
                    y: 150 + Math.random() * (canvas.height - 300),
                    w: 100 + Math.random() * 150,
                    h: 20
                });
            }
            // הוספת קיר טיפוס אקראי
            data.plats.push({ x: 200 + Math.random() * (canvas.width-400), y: 50, w: 30, h: 400 });

            // הוספת חייזרים לפי רמת קושי
            const numAliens = Math.min(5, Math.floor(lvlNum / 5) + 1);
            for (let i = 0; i < numAliens; i++) {
                data.aliens.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height - 100),
                    range: 100 + Math.random() * 200,
                    speed: 2 + (Math.random() * (lvlNum/10)),
                    curX: 0, d: 1
                });
                data.aliens[i].curX = data.aliens[i].x;
            }
            
            // לייזרים אקראיים
            if (Math.random() > 0.5) {
                data.lasers.push({ x: 300 + Math.random() * 400 });
                data.btns.push({ x: 100 + Math.random() * 200, y: 200, w: 30, h: 15, p: false });
            }
        }
        return data;
    }

    currentLevelData = createNewLevel(level);

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function reset() {
        player.x = 50; player.y = canvas.height - 100; player.xv = 0; player.yv = 0;
        lasersOn = true;
        currentLevelData = createNewLevel(level); // יוצר שלב חדש לגמרי בכל פסילה!
    }

    function triggerQuiz() {
        gameActive = false;
        const r = riddles[Math.floor(Math.random() * riddles.length)];
        document.getElementById('quiz').style.display = 'block';
        document.getElementById('q').innerText = r.q;
        const div = document.getElementById('opts'); div.innerHTML = '';
        r.o.forEach((opt, i) => {
            const b = document.createElement('button'); b.innerText = opt;
            b.onclick = () => {
                if(i === r.c) score += 50;
                document.getElementById('quiz').style.display = 'none';
                level++;
                document.getElementById('lvl').innerText = level;
                reset(); gameActive = true; loop();
            };
            div.appendChild(b);
        });
    }

    function update() {
        if (!gameActive) return;
        const l = currentLevelData;

        if (keys.ArrowRight) player.xv = player.speed;
        else if (keys.ArrowLeft) player.xv = -player.speed;
        else player.xv *= 0.8;

        player.yv += player.grav;
        player.x += player.xv; player.y += player.yv;

        let ground = false, wall = false;
        l.plats.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
                if (player.y + player.h - player.yv <= p.y) { player.y = p.y - player.h; player.yv = 0; ground = true; }
                else { wall = true; player.yv = Math.min(player.yv, 2); }
            }
        });

        if ((keys.Space || keys.ArrowUp) && (ground || wall)) {
            player.yv = -player.jump;
            if (wall && !ground) player.xv = player.xv > 0 ? -12 : 12;
        }

        l.btns.forEach(b => {
            if (player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
                b.p = true; lasersOn = false;
            }
        });

        if (lasersOn) {
            l.lasers.forEach(lz => { if (player.x + player.w > lz.x && player.x < lz.x + 8) reset(); });
        }

        l.aliens.forEach(a => {
            a.curX += a.speed * a.dir;
            if (Math.abs(a.curX - a.x) > a.range) a.dir *= -1;
            if (player.x < a.curX + 30 && player.x + player.w > a.curX && player.y < a.y + 30 && player.y + player.h > a.y) reset();
        });

        if (l.isBoss) {
            l.boss.x += l.boss.speed;
            if (l.boss.x > canvas.width - 150 || l.boss.x < 0) l.boss.speed *= -1;
            if (player.x < l.boss.x + l.boss.w && player.x + player.w > l.boss.x && player.y < l.boss.y + l.boss.h && player.y + player.h > l.boss.y) {
                if (player.yv > 0) { // אם קופצים על הבוס מלמעלה
                    l.bossHp -= 10;
                    player.yv = -10;
                    document.getElementById('boss-hp').innerText = l.bossHp;
                    if (l.bossHp <= 0) triggerQuiz();
                } else reset();
            }
        } else {
            if (player.x < l.door.x + l.door.w && player.x + player.w > l.door.x && player.y < l.
