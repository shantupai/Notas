<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - הגרסה המלאה עם הכפיל</title>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #0b0f19; border: 2px solid #334155; }
        #stats { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 18px; pointer-events: none; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div id="stats">
        <div>🚀 שלב: <span id="lvl">1</span></div>
        <div>❤️ חיים: <span id="hp">3</span></div>
        <div>✨ כוכבים: <span id="sc">0</span></div>
        <div style="color: #f87171;">🤖 כפיל: <span id="cl-stat">לא פעיל</span></div>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    canvas.width = 1100; canvas.height = 550;

    let level = 1, score = 0, health = 3, frames = 0;
    let player = { x: 50, y: 450, w: 25, h: 25, xv: 0, yv: 0, jumps: 0, invul: 0, superTimer: 0, ghostTimer: 0, hasShield: false };
    let aiClone = null; 
    let platforms = [], walls = [], stars = [], items = [], aliens = [], spikes = [], door = {};
    let keys = {};

    function setupLevel() {
        platforms = []; walls = []; stars = []; spikes = []; aliens = []; items = [];
        player.x = 80; player.y = 450; player.xv = 0; player.yv = 0;
        aiClone = null;

        // רצפה וקירות
        platforms.push({ x: 0, y: 520, w: 1100, h: 30 }); 
        walls.push({ x: 450, y: 150, w: 40, h: 300 }); 

        // הכוכב האדום - נמצא על פלטפורמה ממש מעל ההתחלה!
        platforms.push({ x: 50, y: 350, w: 100, h: 12 });
        items.push({ x: 100, y: 330, type: 'red', collected: false });

        // כוכבים אחרים
        stars.push({ x: 550, y: 200, type: 'yellow', collected: false });
        stars.push({ x: 800, y: 300, type: 'yellow', collected: false });
        items.push({ x: 700, y: 100, type: 'pink', collected: false }); // כוכב ורוד (בלתי נראה)

        // חייזרים
        for(let i=0; i<3; i++) {
            aliens.push({ x: 500 + i*150, y: 200, baseY: 200, alive: true, offset: i });
        }

        door = { x: 1000, y: 460, w: 40, h: 60 };
        document.getElementById('lvl').innerText = level;
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function applyEffect(type) {
        if(type === 'yellow') score += 50;
        if(type === 'red') { aiClone = { x: player.x, y: player.y, w: 20, h: 20 }; score += 100; }
        if(type === 'pink') { player.ghostTimer = 400; score += 150; }
    }

    function update() {
        frames++;
        if(player.invul > 0) player.invul--;
        if(player.ghostTimer > 0) player.ghostTimer--;

        // תנועת שחקן
        if(keys.ArrowRight) player.xv = 6;
        else if(keys.ArrowLeft) player.xv = -6;
        else player.xv *= 0.8;

        // בדיקת קיר לטיפוס
        let wallSide = null;
        walls.forEach(w => {
            if (player.y + player.h > w.y && player.y < w.y + w.h) {
                if (player.x + player.w + 5 > w.x && player.x < w.x) wallSide = "left";
                if (player.x - 5 < w.x + w.w && player.x + player.w > w.x + w.w) wallSide = "right";
            }
        });

        if (wallSide && player.yv > 0) {
            player.yv = 1.5; // החלקה על קיר
            player.jumps = 0;
        } else {
            player.yv += 0.6; // גרביטציה
        }

        if ((keys.Space || keys.ArrowUp) && !player.jumpLock) {
            if (wallSide) {
                player.yv = -13; player.xv = (wallSide === "left") ? -10 : 10;
            } else if (player.jumps < 2) {
                player.yv = -11; player.jumps++;
            }
            player.jumpLock = true;
        }
        if (!keys.Space && !keys.ArrowUp) player.jumpLock = false;

        player.x += player.xv; player.y += player.yv;

        // התנגשויות
        platforms.forEach(p => {
            if(player.x < p.x+p.w && player.x+player.w > p.x && player.y+player.h > p.y && player.y+player.h < p.y+p.h+10 && player.yv >= 0) {
                player.y = p.y - player.h; player.yv = 0; player.jumps = 0;
            }
        });
        walls.forEach(w => {
            if(player.x < w.x+w.w && player.x+player.w > w.x && player.y < w.y+w.h && player.y+player.h > w.y) {
                if(player.xv > 0 && player.x < w.x) player.x = w.x - player.w;
                else if(player.xv < 0 && player.x > w.x) player.x = w.x + w.w;
            }
        });

        // לוגיקת כפיל AI
        if(aiClone) {
            document.getElementById('cl-stat').innerText = "פעיל";
            let target = [...stars, ...items].find(s => !s.collected);
            if(target) {
                let dx = target.x - aiClone.x, dy = target.y - aiClone.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                aiClone.x += (dx/dist) * 6; aiClone.y += (dy/dist) * 6;
                if(dist < 20) { target.collected = true; applyEffect(target.type); }
            }
        }

        // איסוף שחקן
        [...stars, ...items].forEach(s => {
            if(!s.collected && Math.abs(player.x - s.x) < 30 && Math.abs(player.y - s.y) < 30) {
                s.collected = true; applyEffect(s.type);
            }
        });

        // נזק מחייזרים (רק אם לא ורוד/בלתי נראה)
        aliens.forEach(a => {
            a.y = a.baseY + Math.sin(frames * 0.05 + a.offset) * 50;
            if(a.alive && player.ghostTimer <= 0 && player.invul <= 0 && Math.abs(player.x - a.x) < 25 && Math.abs(player.y - a.y) < 25) {
                health--; player.invul = 100; if(health <= 0) { health=3; setupLevel(); }
            }
        });

        if(Math.abs(player.x - door.x) < 40 && Math.abs(player.y - door.y) < 50) { level++; setupLevel(); }
        if(player.y > 600) setupLevel();
        
        document.getElementById('sc').innerText = score;
        document.getElementById('hp').innerText = health;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#1e293b";
        platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
        ctx.fillStyle = "#475569";
        walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

        stars.concat(items).forEach(s => {
            if(!s.collected) {
                ctx.fillStyle = s.type === 'red' ? "#ff4444" : (s.type === 'pink' ? "#f472b6" : "#fbbf24");
                ctx.beginPath(); ctx.arc(s.x, s.y, 10, 0, 7); ctx.fill();
            }
        });

        aliens.forEach(a => { if(a.alive) { ctx.fillStyle = "#f43f5e"; ctx.beginPath(); ctx.arc(a.x+15, a.y+15, 12, 0, 7); ctx.fill(); }});

        ctx.fillStyle = "#8b5cf6"; ctx.fillRect(door.x, door.y, door.w, door.h);

        if(aiClone) {
            ctx.fillStyle = "rgba(255, 68, 68, 0.8)";
            ctx.fillRect(aiClone.x, aiClone.y, 20, 20);
        }

        ctx.fillStyle = player.ghostTimer > 0 ? "rgba(56, 189, 248, 0.3)" : "#38bdf8";
        if(player.invul > 0 && frames % 10 < 5) ctx.globalAlpha = 0;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.globalAlpha = 1;

        requestAnimationFrame(update);
        requestAnimationFrame(draw);
    }

    setupLevel();
</script>
</body>
</html>
