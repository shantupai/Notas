                platforms: [{x: 0, y: 580, w: 900, h: 20}, {x: 200, y: 150, w: 20, h: 450}, {x: 400, y: 0, w: 20, h: 450}, {x: 600, y: 150, w: 20, h: 450}],
                hazards: [],
                aliens: [
                    {x: 50, y: 300, range: 100, speed: 4, currentX: 50, dir: 1},
                    {x: 250, y: 100, range: 100, speed: 4, currentX: 250, dir: 1},
                    {x: 450, y: 400, range: 100, speed: 4, currentX: 450, dir: 1}
                ],
                lasers: [], button: null,
                door: {x: 820, y: 500, w: 40, h: 80},
                riddle: { q: "מה נמצא בסוף כל משפט?", o: ["נקודה", "מילה", "סימן שאלה"], c: 0 }
            },
            { // שלב 6: הקפיצה האחרונה (לבינתיים)
                platforms: [{x: 0, y: 580, w: 100, h: 20}, {x: 800, y: 580, w: 100, h: 20}, {x: 400, y: 300, w: 100, h: 20}],
                hazards: [{x: 100, y: 565, w: 700, h: 15}],
                aliens: [], lasers: [{x1: 0, y1: 150, x2: 900, y2: 150}],
                button: {x: 435, y: 290, w: 30, h: 10, pressed: false},
                door: {x: 850, y: 70, w: 40, h: 80},
                riddle: { q: "כמה זה 2+2?", o: ["3", "4", "5"], c: 1 }
            }
        ];

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function resetLevel() {
            player.x = 50; player.y = 500; player.yVel = 0; player.xVel = 0;
            lasersActive = true;
            if(levels[currentLevel].button) levels[currentLevel].button.pressed = false;
        }

        function showQuiz() {
            gameActive = false;
            const riddle = levels[currentLevel].riddle;
            quizContainer.style.display = 'block';
            document.getElementById('quiz-question').innerText = riddle.q;
            const opts = document.getElementById('quiz-options');
            opts.innerHTML = '';
            riddle.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    if(i === riddle.c) { score += 20; scoreElement.innerText = score; }
                    quizContainer.style.display = 'none';
                    currentLevel++;
                    if(currentLevel >= levels.length) {
                        alert("סיימת את כל השלבים הזמינים! אתה בדרך ל-200!");
                        currentLevel = 0;
                    }
                    levelElement.innerText = currentLevel + 1;
                    resetLevel(); gameActive = true; loop();
                };
                opts.appendChild(btn);
            });
        }

        function update() {
            if (!gameActive) return;
            const lvl = levels[currentLevel];

            if (keys['ArrowRight']) player.xVel = player.speed;
            else if (keys['ArrowLeft']) player.xVel = -player.speed;
            else player.xVel *= 0.8;

            player.yVel += player.gravity;
            player.x += player.xVel;
            player.y += player.yVel;

            player.grounded = false; player.onWall = false;

            lvl.platforms.forEach(plat => {
                if (player.x < plat.x + plat.w && player.x + player.width > plat.x &&
                    player.y < plat.y + plat.h && player.y + player.height > plat.y) {
                    if (player.y + player.height - player.yVel <= plat.y) {
                        player.y = plat.y - player.height; player.yVel = 0; player.grounded = true;
                    } else { player.onWall = true; player.yVel = Math.min(player.yVel, 2); }
                }
            });

            if (lvl.button && player.x < lvl.button.x + lvl.button.w && player.x + player.width > lvl.button.x &&
                player.y < lvl.button.y + lvl.button.h && player.y + player.height > lvl.button.y) {
                lvl.button.pressed = true; lasersActive = false;
            }

            if (lasersActive) {
                lvl.lasers.forEach(l => {
                    if (player.x < Math.max(l.x1, l.x2) + 2 && player.x + player.width > Math.min(l.x1, l.x2) - 2 && 
                        player.y < Math.max(l.y1, l.y2) + 2 && player.y + player.height > Math.min(l.y1, l.y2) - 2) resetLevel();
                });
            }

            lvl.aliens.forEach(a => {
                a.currentX += a.speed * a.dir;
                if (Math.abs(a.currentX - a.x) > a.range) a.dir *= -1;
                if (player.x < a.currentX + 30 && player.x + player.width > a.currentX &&
                    player.y < a.y + 30 && player.y + player.height > a.y) resetLevel();
            });

            lvl.hazards.forEach(hz => {
                if (player.x < hz.x + hz.w && player.x + player.width > hz.x && player.y < hz.y + hz.h && player.y + player.height > hz.y) resetLevel();
            });

            if (player.x < lvl.door.x + lvl.door.w && player.x + player.width > lvl.door.x &&
                player.y < lvl.door.y + lvl.door.h && player.y + player.height > lvl.door.y) showQuiz();

            if ((keys['Space'] || keys['ArrowUp'])) {
                if (player.grounded) { player.yVel = -player.jumpForce; player.grounded = false; }
                else if (player.onWall) { player.yVel = -player.jumpForce; player.xVel = (player.xVel > 0) ? -10 : 10; }
            }

            if (player.y > canvas.height) resetLevel();
        }

        function draw() {
            const lvl = levels[currentLevel];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#10b981'; ctx.fillRect(lvl.door.x, lvl.door.y, lvl.door.w, lvl.door.h);
            ctx.fillStyle = '#64748b'; lvl.platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
            ctx.fillStyle = '#ef4444'; lvl.hazards.forEach(h => ctx.fillRect(h.x, h.y, h.w, h.h));
            if(lvl.button) {
                ctx.fillStyle = lvl.button.pressed ? '#22c55e' : '#ef4444';
                ctx.fillRect(lvl.button.x, lvl.button.y, lvl.button.w, lvl.button.h);
            }
            if (lasersActive) {
                ctx.strokeStyle = '#f43f5e'; ctx.lineWidth = 4;
                lvl.lasers.forEach(l => { ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke(); });
            }
            ctx.fillStyle = '#a855f7';
            lvl.aliens.forEach(a => { ctx.beginPath(); ctx.arc(a.currentX + 15, a.y + 15, 15, 0, Math.PI*2); ctx.fill(); });
            ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function loop() { if (gameActive) { update(); draw(); requestAnimationFrame(loop); } }
        loop();
    </script>
</body>
</html>
