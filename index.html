<!DOCTYPE html>
<html>
<head>
    <title>בדיקת הנוטאים</title>
    <style>
        body { background: black; color: white; text-align: center; font-family: sans-serif; }
        canvas { background: #111; border: 2px solid white; }
    </style>
</head>
<body>
    <h1>אם אתם רואים את זה - האתר עובד!</h1>
    <p>השתמשו בחצים כדי להזיז את הריבוע הכחול</p>
    <canvas id="c" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let x = 50, y = 50;
        
        function draw() {
            ctx.clearRect(0,0,400,400);
            ctx.fillStyle = 'dodgerblue';
            ctx.fillRect(x, y, 30, 30);
            requestAnimationFrame(draw);
        }
        
        window.onkeydown = (e) => {
            if(e.key == "ArrowRight") x += 10;
            if(e.key == "ArrowLeft") x -= 10;
            if(e.key == "ArrowUp") y -= 10;
            if(e.key == "ArrowDown") y += 10;
        };
        draw();
    </script>
</body>
</html>
