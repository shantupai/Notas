<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - המשחק</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #333; margin: auto; border: 4px solid #555; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">כוכבים: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = 800;
        canvas.height = 600;

        let score = 0;

        // הגדרות שחקן
        const player = {
            x: 100, y: 500, width: 30, height: 30,
            color: '#00d2ff', xVel: 0, yVel: 0,
            speed: 5, jumpForce: 12, gravity: 0.6,
            grounded: false, onWall: false
        };

        const keys = {};
        const platforms = [
            {x: 0, y: 580, w: 800, h: 20}, // רצפה
            {x: 200, y: 450, w: 100, h: 20},
            {x: 400, y: 350, w: 100, h: 20},
            {x: 0, y: 300, w: 50, h: 300},  // קיר שמאלי להיצמדות
            {x: 750, y: 100, w: 50, h: 400} // קיר ימני להיצמדות
        ];

        const stars = [
            {x: 230, y: 420, size: 10, collected: false},
            {x: 430, y: 320, size: 10, collected: false},
            {x: 770, y: 80, size: 10, collected: false}
        ];

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            // תנועה ימינה ושמאלה
            if (keys['ArrowRight']) player.xVel = player.speed;
            else if (keys['ArrowLeft']) player.xVel = -player.speed;
            else player.xVel *= 0.8;

            player.yVel += player.gravity;
            player.x += player.xVel;
            player.y += player.yVel;

            player.grounded = false;
            player.onWall = false;

            // בדיקת התנגשות עם פלטפורמות וקירות
            for (let plat of platforms) {
                if (player.x < plat.x + plat.w && player.x + player.width > plat.x &&
                    player.y < plat.y + plat.h && player.y + player.height > plat.y) {
                    
                    // מניעת נפילה דרך הרצפה
                    if (player.y + player.height - player.yVel <= plat.y) {
                        player.y = plat.y - player.height;
                        player.yVel = 0;
                        player.grounded = true;
                    } 
                    // היצמדות לקיר
                    else {
                        player.onWall = true;
                        if (player.yVel > 2) player.yVel = 2; // החלקה איטית על הקיר
                    }
                }
            }

            // קפיצה רגילה או קפיצת קיר
            if (keys['Space'] || keys['ArrowUp']) {
                if (player.grounded) {
                    player.yVel = -player.jumpForce;
                    player.grounded = false;
                } else if (player.onWall) {
                    player.yVel = -player.jumpForce;
                    player.xVel = (player.xVel > 0) ? -10 : 10;
                }
            }

            // איסוף כוכבים
            for (let star of stars) {
                if (!star.collected && player.x < star.x + star.size && player.x + player.width > star.x &&
                    player.y < star.y + star.size && player.y + player.height > star.y) {
                    star.collected = true;
                    score += 1;
                    scoreElement.innerText = score;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ציור פלטפורמות
            ctx.fillStyle = '#777';
            for (let plat of platforms) ctx.fillRect(plat.x, plat.y, plat.w, plat.h);

            // ציור כוכבים
            ctx.fillStyle = 'yellow';
            for (let star of stars) {
                if (!star.collected) ctx.beginPath(), ctx.arc(star.x, star.y, star.size, 0, Math.PI*2), ctx.fill();
            }

            // ציור שחקן
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
