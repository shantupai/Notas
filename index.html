<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - תיקון טיפוס קירות</title>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #0b0f19; border: 2px solid #334155; }
        #stats { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 18px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="stats">
        <div>🚀 שלב: <span id="lvl">1</span> | ❤️ חיים: <span id="hp">3</span> | ✨ כוכבים: <span id="sc">0</span></div>
    </div>
    <div style="position: absolute; bottom: 20px; width: 100%; text-align: center; color: #64748b;">
        טיפ: היצמד לקיר עם החצים ופשוט תלחץ **רווח** כדי לזנק למעלה!
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    canvas.width = 1100; canvas.height = 550;

    let level = 1, score = 0, health = 3, frames = 0;
    let player = { x: 50, y: 450, w: 25, h: 25, xv: 0, yv: 0, jumps: 0, invul: 0, superTimer: 0, ghostTimer: 0, hasShield: false };
    let aiClone = null;
    let platforms = [], walls = [], stars = [], items = [], aliens = [], spikes = [], door = {};
    let keys = {};

    function setupLevel() {
        platforms = []; walls = []; stars = []; spikes = []; aliens = []; items = [];
        player.x = 50; player.y = 450; player.xv = 0; player.yv = 0;
        aiClone = null;

        // רצפה וקירות ברורים לטיפוס
        platforms.push({ x: 0, y: 520, w: 1100, h: 30 }); 
        walls.push({ x: 400, y: 100, w: 40, h: 350 }); // קיר מרכזי לטיפוס
        walls.push({ x: 700, y: 100, w: 40, h: 350 });

        // פלטפורמות עזר
        for(let i=0; i<8; i++) {
            platforms.push({ x: 100 + i*120, y: 400 - i*30, w: 80, h: 10 });
        }

        // כוכבים ופריטים
        stars.push({ x: 450, y: 150, type: 'yellow', collected: false });
        items.push({ x: 150, y: 150, type: 'red', collected: false }); // כוכב אדום לכפיל

        door = { x: 1020, y: 60, w: 40, h: 60 };
        document.getElementById('lvl').innerText = level;
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function update() {
        frames++;
        if(player.invul > 0) player.invul--;

        // תנועה אופקית
        if(keys.ArrowRight) player.xv = 6;
        else if(keys.ArrowLeft) player.xv = -6;
        else player.xv *= 0.8;

        // בדיקת נגיעה בקיר (Wall Detection)
        let wallSide = null;
        walls.forEach(w => {
            if (player.y + player.h > w.y && player.y < w.y + w.h) {
                if (player.x + player.w + 5 > w.x && player.x < w.x) wallSide = "left";
                if (player.x - 5 < w.x + w.w && player.x + player.w > w.x + w.w) wallSide = "right";
            }
        });

        // פיזיקת קיר
        if (wallSide && player.yv > 0) {
            player.yv = 1.5; // "חיכוך" - החלקה איטית מאוד על הקיר
            player.jumps = 0; // מאפס קפיצות כשנוגעים בקיר
        } else {
            player.yv += 0.6; // גרביטציה רגילה
        }

        // קפיצת קיר (Wall Jump)
        if ((keys.Space || keys.ArrowUp) && !player.jumpLock) {
            if (wallSide) {
                player.yv = -14; // זינוק חזק למעלה
                player.xv = (wallSide === "left") ? -10 : 10; // זינוק הצידה מהקיר
                player.jumpLock = true;
            } else if (player.yv === 0 || player.jumps < 1) {
                player.yv = -12;
                player.jumps++;
                player.jumpLock = true;
            }
        }
        if (!keys.Space && !keys.ArrowUp) player.jumpLock = false;

        player.x += player.xv;
        player.y += player.yv;

        // התנגשויות (מניעת מעבר דרך קירות)
        walls.forEach(w => {
            if(player.x < w.x+w.w && player.x+player.w > w.x && player.y < w.y+w.h && player.y+player.h > w.y) {
                if(player.xv > 0 && player.x < w.x) player.x = w.x - player.w;
                else if(player.xv < 0 && player.x > w.x) player.x = w.x + w.w;
            }
        });

        platforms.forEach(p => {
            if(player.x < p.x+p.w && player.x+player.w > p.x && player.y+player.h > p.y && player.y+player.h < p.y+p.h+10 && player.yv >= 0) {
                player.y = p.y - player.h; player.yv = 0; player.jumps = 0;
            }
        });

        // לוגיקת כפיל AI (הכוכב האדום)
        if(aiClone) {
            let target = [...stars, ...items].find(s => !s.collected);
            if(target) {
                let angle = Math.atan2(target.y - aiClone.y, target.x - aiClone.x);
                aiClone.x += Math.cos(angle) * 5;
                aiClone.y += Math.sin(angle) * 5;
                if(Math.hypot(target.x - aiClone.x, target.y - aiClone.y) < 20) {
                    target.collected = true; score += 100;
                    if(target.type === 'red') aiClone = {x: player.x, y: player.y, w: 20, h: 20};
                }
            }
        }

        // איסוף שחקן
        [...stars, ...items].forEach(s => {
            if(!s.collected && Math.abs(player.x - s.x) < 30 && Math.abs(player.y - s.y) < 30) {
                s.collected = true; score += 50;
                if(s.type === 'red') aiClone = { x: player.x, y: player.y, w: 20, h: 20 };
            }
        });

        if(player.y > 600) setupLevel();
        document.getElementById('sc').innerText = score;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#334155";
        walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
        
        ctx.fillStyle = "#1e293b";
        platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

        stars.concat(items).forEach(s => {
            if(!s.collected) {
                ctx.fillStyle = s.type === 'red' ? "#ef4444" : "#fbbf24";
                ctx.beginPath(); ctx.arc(s.x, s.y, 10, 0, Math.PI*2); ctx.fill();
            }
        });

        if(aiClone) {
            ctx.fillStyle = "rgba(239, 68, 68, 0.7)";
            ctx.fillRect(aiClone.x, aiClone.y, aiClone.w, aiClone.h);
        }

        ctx.fillStyle = "#38bdf8";
        ctx.fillRect(player.x, player.y, player.w, player.h);
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    setupLevel();
    gameLoop();
</script>
</body>
</html>
