<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - קרב עם חייזרים ואקדח</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; margin: 0 auto; background: #0f172a; border-bottom: 5px solid #334155; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #boss-ui { display: none; color: #f87171; text-align: center; }
        #hp-bar { width: 200px; height: 15px; background: #555; border: 2px solid white; display: inline-block; vertical-align: middle; }
        #hp-fill { width: 100%; height: 100%; background: red; transition: 0.1s; }
        #quiz { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                background: white; color: black; padding: 30px; border-radius: 20px; text-align: center; z-index: 100; box-shadow: 0 0 50px rgba(255,0,0,0.5); }
        button { padding: 15px; margin: 10px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 18px; width: 100%; }
    </style>
</head>
<body>
    <div id="ui">
        <div>🚀 שלב: <span id="lvl">1</span></div>
        <div id="boss-ui">👿 בוס: <div id="hp-bar"><div id="hp-fill"></div></div></div>
        <div>✨ כוכבים: <span id="sc">0</span></div>
    </div>
    <div id="quiz"><h2 id="q">חידה!</h2><div id="opts"></div></div>
    <canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let level = 1, score = 0, gameActive = true, lasersOn = true;
    let currentLevelData = null, bullets = [], lastDir = 1;
    
    const player = { x: 100, y: 0, w: 30, h: 30, xv: 0, yv: 0, speed: 6, jump: 12, grav: 0.6 };
    const keys = {};

    const riddles = [
        { q: "מה עולה למעלה ולא יורד?", o: ["בלון", "גיל", "מטוס"], c: 1 },
        { q: "מפתחות ללא מנעול?", o: ["פסנתר", "סוהר", "מפה"], c: 0 },
        { q: "מה רץ בלי רגליים?", o: ["זמן", "מים", "רוח"], c: 1 },
        { q: "מה מלא חורים ומחזיק מים?", o: ["ספוג", "מסננת", "רשת"], c: 0 }
    ];

    function createNewLevel(lvlNum) {
        const isBoss = lvlNum % 10 === 0;
        document.getElementById('boss-ui').style.display = isBoss ? 'inline-block' : 'none';
        if (isBoss) document.getElementById('hp-fill').style.width = '100%';
        
        bullets = []; // ניקוי כדורים

        let data = {
            isBoss: isBoss,
            bossHP: 100, maxBossHP: 100 + (lvlNum * 5),
            color: `hsl(${Math.random() * 360}, 40%, 15%)`,
            plats: [{x: 0, y: canvas.height - 40, w: canvas.width, h: 40}],
            aliens: [], lasers: [], btns: [],
            door: { x: canvas.width - 80, y: canvas.height - 120, w: 50, h: 80 }
        };

        if (isBoss) {
            data.boss = { x: canvas.width/2 - 100, y: 100, w: 200, h: 200, speed: 3 + (lvlNum/20) };
            data.plats.push({x: 200, y: 400, w: 200, h: 20}, {x: canvas.width-400, y: 400, w: 200, h: 20});
        } else {
            for (let i = 0; i < 6; i++) {
                data.plats.push({ x: Math.random()*(canvas.width-200), y: 150+Math.random()*(canvas.height-300), w: 100+Math.random()*150, h: 20 });
            }
            data.plats.push({ x: 200+Math.random()*(canvas.width-400), y: 50, w: 30, h: 400 }); // קיר טיפוס

            const numAliens = Math.min(6, Math.floor(lvlNum / 3) + 1);
            for (let i = 0; i < numAliens; i++) {
                data.aliens.push({
                    x: Math.random() * canvas.width, y: 100 + Math.random()*(canvas.height-200),
                    range: 100 + Math.random()*200, speed: 2 + (Math.random()*(lvlNum/10)),
                    curX: 0, d: 1, alive: true
                });
                data.aliens[i].curX = data.aliens[i].x;
            }
            if (Math.random() > 0.5) {
                data.lasers.push({ x: 300 + Math.random()*400 });
                data.btns.push({ x: 100+Math.random()*200, y: 200, w: 30, h: 15, p: false });
            }
        }
        return data;
    }

    currentLevelData = createNewLevel(level);

    window.onkeydown = e => { 
        keys[e.code] = true; 
        if (e.code === 'KeyF' && gameActive) shoot(); // יריות עם F
    };
    window.onkeyup = e => keys[e.code] = false;

    function shoot() {
        bullets.push({ x: player.x + 15, y: player.y + 15, xv: 15 * lastDir, yv: 0, w: 8, h: 8, alive: true });
    }

    function reset() {
        player.x = 100; player.y = canvas.height - 100; player.xv = 0; player.yv = 0;
        lasersOn = true;
        currentLevelData = createNewLevel(level);
    }

    function triggerQuiz() {
        gameActive = false;
        const r = riddles[Math.floor(Math.random() * riddles.length)];
        document.getElementById('quiz').style.display = 'block';
        document.getElementById('q').innerText = r.q;
        const div = document.getElementById('opts'); div.innerHTML = '';
        r.o.forEach((opt, i) => {
            const b = document.createElement('button'); b.innerText = opt;
            b.onclick = () => {
                if(i === r.c) score += 100;
                document.getElementById('quiz').style.display = 'none';
                level++; document.getElementById('lvl').innerText = level;
                reset(); gameActive = true; loop();
            };
            div.appendChild(b);
        });
    }

    function update() {
        if (!gameActive) return;
        const l = currentLevelData;

        if (keys.ArrowRight) { player.xv = player.speed; lastDir = 1; }
        else if (keys.ArrowLeft) { player.xv = -player.speed; lastDir = -1; }
        else player.xv *= 0.8;

        player.yv += player.grav;
        player.x += player.xv; player.y += player.yv;

        let ground = false, wall = false;
        l.plats.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
                if (player.y + player.h - player.yv <= p.y) { player.y = p.y - player.h; player.yv = 0; ground = true; }
                else { wall = true; player.yv = Math.min(player.yv, 2); }
            }
        });

        if ((keys.Space || keys.ArrowUp) && (ground || wall)) {
            player.yv = -player.jump;
            if (wall && !ground) player.xv = player.xv > 0 ? -12 : 12;
        }

        // עדכון כדורים ובדיקת התנגשות בחייזרים
        bullets.forEach(b => {
            if (!b.alive) return;
            b.x += b. xv;
            if (b.x < 0 || b.x > canvas.width) b.alive = false;

            // התנגשות בחייזרים רגילים
            l.aliens.forEach(a => {
                if (a.alive && b.x < a.curX + 30 && b.x + b.w > a.curX && b.y < a.y + 30 && b.y + b.h > a.y) {
                    a.alive = false; b.alive = false; score += 10;
                }
            });

            // התנגשות בבוס
            if (l.isBoss && b.x < l.boss.x + l.boss.w && b.x + b.w > l.boss.x && b.y < l.boss.y + l.boss.h && b.y + b.h > l.boss.y) {
                l.bossHP -= 10;
                b.alive = false;
                const hpPercent = (l.bossHP / l.maxBossHP) * 100;
                document.getElementById('hp-fill').style.width = hpPercent + '%';
                if (l.bossHP <= 0) triggerQuiz();
            }
        });

        l.btns.forEach(b => { if (player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) { b.p = true; lasersOn = false; } });
        if (lasersOn) l.lasers.forEach(lz => { if (player.x + player.w > lz.x && player.x < lz.x + 8) reset(); });

        l.aliens.forEach(a => {
            if (!a.alive) return;
            a.curX += a.speed * a.dir;
            if (Math.abs(a.curX - a.x) > a.range) a.dir *= -1;
            if (player.x < a.curX + 30 && player.x + player.w > a.curX && player.y < a.y + 30 && player.y + player.h > a.y) reset();
        });

        if (l.isBoss) {
            l.boss.x += l.boss.speed;
            if (l.boss.x > canvas.width - 200 || l.boss.x < 0) l.boss.speed *= -1;
            if (player.x < l.boss.x + l.boss.w && player.x + player.w > l.boss.x && player.y < l.boss.y + l.boss.h && player.y + player.h > l.boss.y) reset();
        } else {
            if (player.x < l.door.x + l.door.w && player.x + player.w > l.door.x && player.y < l.door.y + l.door.h && player.y + player.h > l.door.y) triggerQuiz();
        }

        if (player.y > canvas.height || player.x < 0 || player.x > canvas.width) reset();
    }

    function draw() {
        const l = currentLevelData;
        ctx.fillStyle = l.color; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#4ade80"; ctx.fillRect(l.door.x, l.door.y, l.door.w, l.door.h);
        ctx.fillStyle = "#64748b"; l.plats.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
        
        l.btns.forEach(b => { ctx.fillStyle = b.p ? "#22c55e" : "#ef4444"; ctx.fillRect(b.x, b.y, b.w, b.h); });
        if (lasersOn) { ctx.fillStyle = "rgba(255,0,0,0.6)"; l.lasers.forEach(lz => ctx.fillRect(lz.x, 0, 8, canvas.height)); }
        
        // ציור חייזרים (רק מי שחי)
        ctx.fillStyle = "#a855f7"; 
        l.aliens.forEach(a => { if(a.alive) { ctx.beginPath(); ctx.arc(a.curX+15, a.y+15, 15, 0, 7); ctx.fill(); } });

        // ציור כדורים
        ctx.fillStyle = "gold"; ctx.shadowBlur = 10; ctx.shadowColor = "gold";
        bullets.forEach(b => { if(b.alive) ctx.fillRect(b.x, b.y, b.w, b.h); });
        ctx.shadowBlur = 0;

        if (l.isBoss) {
            ctx.fillStyle = "#f87171"; ctx.shadowBlur = 40; ctx.shadowColor = "red"; ctx.fillRect(l.boss.x, l.boss.y, l.boss.w, l.boss.h); ctx.shadowBlur = 0;
            ctx.fillStyle = "black"; ctx.fillRect(l.boss.x+40, l.boss.y+50, 30, 30); ctx.fillRect(l.boss.x+130, l.boss.y+50, 30, 30);
        }

        // ציור שחקן ואקדח
        ctx.fillStyle = "#00d2ff"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = "#aaa"; // צבע אקדח
        const gunX = lastDir === 1 ? player.x + 25 : player.x - 5;
        ctx.fillRect(gunX, player.y + 15, 10, 5); // ציור האקדח
        
        document.getElementById('sc').innerText = score;
    }

    function loop() { if (gameActive) { update(); draw(); requestAnimationFrame(loop); } }
    reset(); loop();
</script>
</body>
</html>
