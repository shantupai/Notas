<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - 200 השלבים</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        canvas { display: block; background: #0f172a; margin: auto; border: 5px solid #334155; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 20px; pointer-events: none; }
        #quiz-container {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.8); z-index: 100;
        }
        button { padding: 12px 24px; margin: 8px; cursor: pointer; border-radius: 8px; border: none; background: #3b82f6; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div>כוכבים: <span id="score">0</span></div>
        <div>שלב: <span id="levelDisplay">1</span></div>
    </div>
    
    <div id="quiz-container">
        <h2 id="quiz-question">חידה!</h2>
        <div id="quiz-options"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('levelDisplay');
        const quizContainer = document.getElementById('quiz-container');

        canvas.width = 900;
        canvas.height = 600;

        let score = 0;
        let currentLevel = 0;
        let gameActive = true;
        let lasersActive = true;

        const player = {
            x: 50, y: 500, width: 30, height: 30, color: '#00d2ff',
            xVel: 0, yVel: 0, speed: 5, jumpForce: 11, gravity: 0.5,
            grounded: false, onWall: false
        };

        const keys = {};

        // הגדרת שלבים (אפשר להוסיף כאן עד 200!)
        const levels = [
            { // שלב 1
                platforms: [{x:0, y:580, w:900, h:20}, {x:300, y:400, w:200, h:20}, {x:700, y:300, w:30, h:300}],
                hazards: [{x:200, y:560, w:100, h:20}],
                aliens: [{x:350, y:370, range: 100, speed: 2, currentX: 350, dir: 1}],
                lasers: [{x1: 600, y1: 0, x2: 600, y2: 600}],
                button: {x: 400, y: 390, w: 30, h: 10, pressed: false},
                door: {x: 820, y: 500, w: 40, h: 80},
                riddle: { q: "מה יש לו שיניים אבל לא יכול לנשוך?", o: ["מסרק", "כלב", "תפוח"], c: 0 }
            },
            { // שלב 2
                platforms: [{x:0, y:580, w:900, h:20}, {x:100, y:450, w:100, h:20}, {x:300, y:350, w:100, h:20}, {x:500, y:250, w:100, h:20}],
                hazards: [{x:0, y:560, w:800, h:20}],
                aliens: [],
                lasers: [{x1: 0, y1: 200, x2: 900, y2: 200}],
                button: {x: 530, y: 240, w: 30, h: 10, pressed: false},
                door: {x: 20, y: 370, w: 40, h: 80},
                riddle: { q: "איזה חודש יש בו 28 ימים?", o: ["פברואר", "כולם", "מרץ"], c: 1 }
            }
        ];

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function resetLevel() {
            player.x = 50; player.y = 500; player.yVel = 0;
            lasersActive = true;
            if(levels[currentLevel].button) levels[currentLevel].button.pressed = false;
        }

        function showQuiz() {
            gameActive = false;
            const riddle = levels[currentLevel].riddle;
            quizContainer.style.display = 'block';
            document.getElementById('quiz-question').innerText = riddle.q;
            const opts = document.getElementById('quiz-options');
            opts.innerHTML = '';
            riddle.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    if(i === riddle.c) { score += 20; scoreElement.innerText = score; }
                    quizContainer.style.display = 'none';
                    currentLevel++;
                    if(currentLevel >= levels.length) {
                        alert("ניצחת את כל השלבים הזמינים! אתה אלוף!");
                        currentLevel = 0;
                    }
                    levelElement.innerText = currentLevel + 1;
                    resetLevel();
                    gameActive = true;
                    loop();
                };
                opts.appendChild(btn);
            });
        }

        function update() {
            if (!gameActive) return;
            const lvl = levels[currentLevel];

            // תנועה
            if (keys['ArrowRight']) player.xVel = player.speed;
            else if (keys['ArrowLeft']) player.xVel = -player.speed;
            else player.xVel *= 0.8;

            player.yVel += player.gravity;
            player.x += player.xVel;
            player.y += player.yVel;

            player.grounded = false; player.onWall = false;

            // התנגשות פלטפורמות
            lvl.platforms.forEach(plat => {
                if (player.x < plat.x + plat.w && player.x + player.width > plat.x &&
                    player.y < plat.y + plat.h && player.y + player.height > plat.y) {
                    if (player.y + player.height - player.yVel <= plat.y) {
                        player.y = plat.y - player.height; player.yVel = 0; player.grounded = true;
                    } else { player.onWall = true; player.yVel = Math.min(player.yVel, 2); }
                }
            });

            // כפתור ללייזרים
            if (lvl.button && player.x < lvl.button.x + lvl.button.w && player.x + player.width > lvl.button.x &&
                player.y < lvl.button.y + lvl.button.h && player.y + player.height > lvl.button.y) {
                lvl.button.pressed = true;
                lasersActive = false;
            }

            // לייזרים (מוות)
            if (lasersActive) {
                lvl.lasers.forEach(l => {
                    if (player.x < l.x2 && player.x + player.width > l.x1 && player.y < l.y2 && player.y + player.height > l.y1) resetLevel();
                });
            }

            // חייזרים (זזים)
            lvl.aliens.forEach(a => {
                a.currentX += a.speed * a.dir;
                if (Math.abs(a.currentX - a.x) > a.range) a.dir *= -1;
                if (player.x < a.currentX + 30 && player.x + player.width > a.currentX &&
                    player.y < a.y + 30 && player.y + player.height > a.y) resetLevel();
            });

            // דלת לסיום שלב
            if (player.x < lvl.door.x + lvl.door.w && player.x + player.width > lvl.door.x &&
                player.y < lvl.door.y + lvl.door.h && player.y + player.height > lvl.door.y) {
                showQuiz();
            }

            if ((keys['Space'] || keys['ArrowUp'])) {
                if (player.grounded) { player.yVel = -player.jumpForce; player.grounded = false; }
                else if (player.onWall) { player.yVel = -player.jumpForce; player.xVel = (player.xVel > 0) ? -10 : 10; }
            }

            if (player.y > canvas.height) resetLevel();
        }

        function draw() {
            const lvl = levels[currentLevel];
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // דלת
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(lvl.door.x, lvl.door.y, lvl.door.h/2, lvl.door.h);

            // פלטפורמות
            ctx.fillStyle = '#475569';
            lvl.platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            // כפתור
            ctx.fillStyle = lvl.button.pressed ? 'green' : 'red';
            ctx.fillRect(lvl.button.x, lvl.button.y, lvl.button.w, lvl.button.h);

            // לייזרים
            if (lasersActive) {
                ctx.strokeStyle = 'red'; ctx.lineWidth = 4;
                lvl.lasers.forEach(l => {
                    ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
                });
            }

            // חייזרים
            ctx.fillStyle = '#a855f7';
            lvl.aliens.forEach(a => {
                ctx.beginPath(); ctx.arc(a.currentX + 15, a.y + 15, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.fillRect(a.currentX+5, a.y+10, 5, 5); ctx.fillRect(a.currentX+20, a.y+10, 5, 5);
                ctx.fillStyle = '#a855f7';
            });

            // שחקן
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function loop() { if (gameActive) { update(); draw(); requestAnimationFrame(loop); } }
        loop();
    </script>
</body>
</html>
