<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - גרסת הכפיל האוטומטי</title>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #0b0f19; border: 3px solid #334155; }
        #stats { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 20px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        .info { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #94a3b8; }
    </style>
</head>
<body>
    <div id="stats">
        <div>🚀 שלב: <span id="lvl">1</span></div>
        <div>✨ כוכבים: <span id="sc">0</span></div>
        <div style="color: #f87171;">🤖 הכפיל בפעולה!</div>
    </div>
    <div class="info">חצים לזוז ולקפוץ | הריבוע האדום אוסף כוכבים עבורך!</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    canvas.width = 1000; canvas.height = 500;

    let score = 0, level = 1, frames = 0;
    let player = { x: 100, y: 400, w: 30, h: 30, xv: 0, yv: 0, jumps: 0 };
    
    // הכפיל כבר כאן! לא צריך לאסוף אותו
    let clone = { x: 500, y: 100, w: 20, h: 20, trail: [] };
    
    let platforms = [], stars = [], walls = [];
    let keys = {};

    function init() {
        platforms = [
            { x: 0, y: 470, w: 1000, h: 30 }, // רצפה
            { x: 200, y: 350, w: 150, h: 15 },
            { x: 500, y: 250, w: 150, h: 15 },
            { x: 100, y: 150, w: 150, h: 15 }
        ];
        
        walls = [{ x: 400, y: 100, w: 40, h: 300 }]; // קיר לטיפוס

        // יצירת כוכבים
        stars = [];
        for(let i=0; i<10; i++) {
            stars.push({ x: Math.random()*900+50, y: Math.random()*350+50, active: true });
        }
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function update() {
        frames++;

        // --- תנועת שחקן ---
        if(keys.ArrowRight) player.xv = 6;
        else if(keys.ArrowLeft) player.xv = -6;
        else player.xv *= 0.8;

        // טיפוס קירות פשוט
        let onWall = false;
        walls.forEach(w => {
            if(player.x + player.w + 5 > w.x && player.x - 5 < w.x + w.w && player.y + player.h > w.y && player.y < w.y + w.h) {
                onWall = true;
                player.yv = 1.5; // החלקה על הקיר
            }
        });

        if(!onWall) player.yv += 0.6; // גרביטציה
        player.x += player.xv;
        player.y += player.yv;

        // התנגשות רצפה ופלטפורמות
        platforms.forEach(p => {
            if(player.x < p.x+p.w && player.x+player.w > p.x && player.y+player.h > p.y && player.y+player.h < p.y+p.h+10 && player.yv >= 0) {
                player.y = p.y - player.h; player.yv = 0; player.jumps = 0;
            }
        });

        if((keys.Space || keys.ArrowUp) && !player.jumpLock) {
            if(onWall || player.jumps < 2) {
                player.yv = -12;
                player.jumps++;
                player.jumpLock = true;
            }
        }
        if(!keys.Space && !keys.ArrowUp) player.jumpLock = false;

        // --- לוגיקת הכפיל (AI) ---
        let target = stars.find(s => s.active);
        if(target) {
            let dx = target.x - clone.x;
            let dy = target.y - clone.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            clone.x += (dx/dist) * 5; // מהירות הכפיל
            clone.y += (dy/dist) * 5;

            if(dist < 15) { target.active = false; score += 50; }
        }

        // שומר שובל של הכפיל
        clone.trail.push({x: clone.x, y: clone.y});
        if(clone.trail.length > 10) clone.trail.shift();

        // איסוף שחקן
        stars.forEach(s => {
            if(s.active && Math.abs(player.x - s.x) < 30 && Math.abs(player.y - s.y) < 30) {
                s.active = false; score += 50;
            }
        });

        document.getElementById('sc').innerText = score;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // ציור פלטפורמות וקירות
        ctx.fillStyle = "#1e293b";
        platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
        ctx.fillStyle = "#334155";
        walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

        // ציור כוכבים
        ctx.fillStyle = "#fbbf24";
        stars.forEach(s => {
            if(s.active) { ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, 7); ctx.fill(); }
        });

        // ציור שובל הכפיל
        clone.trail.forEach((t, i) => {
            ctx.fillStyle = `rgba(248, 113, 113, ${i/10})`;
            ctx.fillRect(t.x + 5, t.y + 5, 10, 10);
        });

        // ציור הכפיל (אדום)
        ctx.fillStyle = "#f87171";
        ctx.shadowBlur = 10; ctx.shadowColor = "red";
        ctx.fillRect(clone.x, clone.y, clone.w, clone.h);
        ctx.shadowBlur = 0;

        // ציור שחקן (כחול)
        ctx.fillStyle = "#38bdf8";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        requestAnimationFrame(() => { update(); draw(); });
    }

    init();
    draw();
</script>
</body>
</html>
