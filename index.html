<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - אתגר הלייזרים</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #1a1a2e; margin: auto; border: 5px solid #444; }
        #ui { position: absolute; top: 10px; right: 20px; color: gold; font-size: 24px; font-weight: bold; pointer-events: none; }
        #quiz-container {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 10;
        }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; border-radius: 5px; border: none; background: #00d2ff; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">כוכבים: <span id="score">0</span></div>
    <div id="quiz-container">
        <h2 id="quiz-question">חידה!</h2>
        <div id="quiz-options"></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const quizContainer = document.getElementById('quiz-container');

        canvas.width = 800;
        canvas.height = 600;

        let score = 0;
        let gameActive = true;
        let lastDir = 1; // כיוון אחרון של השחקן (1 לימין, -1 לשמאל)

        const player = {
            x: 50, y: 500, width: 30, height: 30,
            color: '#00d2ff', xVel: 0, yVel: 0,
            speed: 5, jumpForce: 11, gravity: 0.5,
            grounded: false, onWall: false
        };

        const keys = {};
        const lasers = [];
        const enemies = [
            {x: 600, y: 540, w: 30, h: 40, speed: 2, dir: 1, alive: true},
            {x: 300, y: 160, w: 30, h: 40, speed: 1.5, dir: -1, alive: true}
        ];

        const platforms = [
            {x: 0, y: 580, w: 800, h: 20},
            {x: 0, y: 0, w: 20, h: 600},
            {x: 780, y: 0, w: 20, h: 600},
            {x: 150, y: 350, w: 30, h: 150}, 
            {x: 300, y: 200, w: 30, h: 200},
            {x: 500, y: 150, w: 100, h: 20}
        ];

        const stars = [{x: 70, y: 270, size: 8, collected: false}];
        const quizBox = {x: 700, y: 60, w: 30, h: 30, active: true};

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            // ירי בלייזר עם מקש X
            if (e.code === 'KeyX' && gameActive) {
                lasers.push({ x: player.x + 15, y: player.y + 15, speed: 10 * lastDir });
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if (!gameActive) return;

            if (keys['ArrowRight']) { player.xVel = player.speed; lastDir = 1; }
            else if (keys['ArrowLeft']) { player.xVel = -player.speed; lastDir = -1; }
            else player.xVel *= 0.8;

            player.yVel += player.gravity;
            player.x += player.xVel;
            player.y += player.yVel;

            player.grounded = false;
            player.onWall = false;

            // התנגשות בפלטפורמות
            for (let plat of platforms) {
                if (player.x < plat.x + plat.w && player.x + player.width > plat.x &&
                    player.y < plat.y + plat.h && player.y + player.height > plat.y) {
                    if (player.y + player.height - player.yVel <= plat.y) {
                        player.y = plat.y - player.height;
                        player.yVel = 0;
                        player.grounded = true;
                    } else {
                        player.onWall = true;
                        player.yVel = Math.min(player.yVel, 2);
                    }
                }
            }

            // עדכון לייזרים ובדיקת פגיעה בחייזרים
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.x += l.speed;
                
                // הסרת לייזר אם יצא מהמסך
                if (l.x < 0 || l.x > canvas.width) lasers.splice(i, 1);

                // בדיקת פגיעה בחייזרים
                for (let en of enemies) {
                    if (en.alive && l.x > en.x && l.x < en.x + en.w && l.x > en.x && l.y > en.y && l.y < en.y + en.h) {
                        en.alive = false; // החייזר מת!
                        lasers.splice(i, 1); // הלייזר נעלם
                        score += 5;
                        scoreElement.innerText = score;
                        break;
                    }
                }
            }

            // עדכון חייזרים (תנועה)
            for (let en of enemies) {
                if (en.alive) {
                    en.x += en.speed * en.dir;
                    if (en.x > 700 || en.x < 100) en.dir *= -1; // משנה כיוון בקצוות
                    
                    // אם שחקן נוגע בחייזר חי - הוא מת
                    if (player.x < en.x + en.w && player.x + player.width > en.x &&
                        player.y < en.y + en.h && player.y + player.height > en.y) {
                        player.x = 50; player.y = 500; // איפוס שחקן
                    }
                }
            }

            if ((keys['Space'] || keys['ArrowUp'])) {
                if (player.grounded) { player.yVel = -player.jumpForce; player.grounded = false; }
                else if (player.onWall) { player.yVel = -player.jumpForce; player.xVel = (player.xVel > 0) ? -8 : 8; }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // ציור פלטפורמות
            ctx.fillStyle = '#4a4e69';
            for (let plat of platforms) ctx.fillRect(plat.x, plat.y, plat.w, plat.h);

            // ציור לייזרים
            ctx.fillStyle = 'yellow';
            for (let l of lasers) ctx.fillRect(l.x, l.y, 15, 4);

            // ציור חייזרים
            for (let en of enemies) {
                if (en.alive) {
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(en.x, en.y, en.w, en.h);
                    // עיניים קטנות לחייזר
                    ctx.fillStyle = 'white';
                    ctx.fillRect(en.x + 5, en.y + 5, 5, 5);
                    ctx.fillRect(en.x + 20, en.y + 5, 5, 5);
                }
            }

            // שחקן
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function loop() { if (gameActive) { update(); draw(); requestAnimationFrame(loop); } }
        loop();
    </script>
</body>
</html>
