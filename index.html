<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>מסיבת חשבון בחלל</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { border: 4px solid #fff; border-radius: 10px; }
        #math-ui {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 15px; text-align: center;
            display: none; border: 5px solid #9b59b6; z-index: 10;
        }
        #math-ui input { font-size: 24px; width: 80px; text-align: center; }
    </style>
</head>
<body>

<div id="math-ui">
    <h2 id="question">?</h2>
    <input type="number" id="answer-input" />
    <p>הקש תשובה ו-Enter</p>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800, height: 600,
    physics: { default: 'arcade', arcade: { gravity: { y: 800 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

let p1, p2, p3, cheerleader, fishGroup, platforms, aliens, cursors, keys, keys2, ladders, door;
let score = 0, level = 1, isMathActive = false, currentFish = null, correctAnswer;

const game = new Phaser.Game(config);

function preload() {}

function create() {
    this.add.rectangle(400, 300, 800, 600, 0x0f0c29); // רקע גלקסיה

    platforms = this.physics.add.staticGroup();
    ladders = this.physics.add.staticGroup();
    aliens = this.physics.add.group();
    fishGroup = this.physics.add.group();

    // יצירת גרפיקה
    drawPenguin(this); drawTiger(this); drawPanda(this); drawAlien(this); drawFish(this);

    // בניית שלב
    buildLevel(this);

    // שחקנים
    p1 = this.physics.add.sprite(50, 500, 'p1').setCollideWorldBounds(true); // פינגווין
    p2 = this.physics.add.sprite(100, 500, 'p2').setCollideWorldBounds(true); // נמר
    p3 = this.physics.add.sprite(150, 500, 'p3').setCollideWorldBounds(true); // פנדה

    // מעודד (פינגווין קטן)
    cheerleader = this.add.sprite(40, 545, 'p1').setScale(0.6).setTint(0xffff00);
    this.tweens.add({ targets: cheerleader, y: 520, duration: 300, yoyo: true, repeat: -1 });

    // מקשים
    cursors = this.input.keyboard.createCursorKeys();
    keys = this.input.keyboard.addKeys('W,A,D');
    keys2 = this.input.keyboard.addKeys('I,J,L');

    // התנגשויות
    this.physics.add.collider([p1, p2, p3, aliens], platforms);
    
    // איסוף דג
    this.physics.add.overlap([p1, p2, p3], fishGroup, (p, f) => { if (!isMathActive) startMath(f); }, null, this);

    // חייזרים מצחיקים
    this.physics.add.overlap([p1, p2, p3], aliens, (p, a) => { if (!p.isFunny) makeFunny(this, p); }, null, this);

    // מעבר דלת
    this.physics.add.overlap([p1, p2, p3], door, () => {
        if (score >= 4) {
            level++;
            alert("כל הכבוד! עוברים לשלב " + level);
            this.scene.restart();
            score = 0;
        }
    }, null, this);

    document.getElementById('answer-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkAns();
    });
}

function update() {
    if (isMathActive) { [p1, p2, p3].forEach(p => p.setVelocity(0)); return; }

    move(p1, cursors.left, cursors.right, cursors.up);
    move(p2, keys.A, keys.D, keys.W);
    move(p3, keys2.J, keys2.L, keys2.I);

    aliens.children.iterate(a => {
        if (a.body.blocked.left || a.x <= 20) a.setVelocityX(150);
        else if (a.body.blocked.right || a.x >= 780) a.setVelocityX(-150);
    });
}

function buildLevel(scene) {
    createPlatform(400, 585, 800, 30, 0x2c3e50); // רצפה
    createPlatform(200, 450, 300, 20, 0x34495e);
    createPlatform(600, 320, 300, 20, 0x34495e);
    createPlatform(300, 180, 300, 20, 0x34495e);

    drawLadder(scene, 100, 515, 140);
    drawLadder(scene, 400, 385, 140);
    drawLadder(scene, 150, 250, 140);

    createAlien(300, 540); createAlien(500, 400); createAlien(200, 250);

    spawnFish([{x:250,y:410}, {x:550,y:280}, {x:300,y:140}, {x:750,y:520}]);

    door = scene.add.rectangle(750, 100, 60, 90, 0xff0000);
    scene.physics.add.existing(door, true);
    scene.add.text(730, 50, "יציאה", {fontSize:'16px', fill:'#fff'});
}

function move(p, l, r, u) {
    p.body.allowGravity = true;
    if (l.isDown) { p.setVelocityX(-200); p.setFlipX(true); }
    else if (r.isDown) { p.setVelocityX(200); p.setFlipX(false); }
    else p.setVelocityX(0);

    game.scene.scenes[0].physics.overlap(p, ladders, () => {
        if (u.isDown) { p.setVelocityY(-180); p.body.allowGravity = false; }
    });
    if (u.isDown && p.body.touching.down) p.setVelocityY(-450);
}

function startMath(fish) {
    isMathActive = true; currentFish = fish;
    let n1 = Math.floor(Math.random() * 10) + level;
    let n2 = Math.floor(Math.random() * 10);
    correctAnswer = n1 + n2;
    document.getElementById('question').innerText = `כמה זה ${n1} + ${n2}?`;
    document.getElementById('math-ui').style.display = 'block';
    document.getElementById('answer-input').value = ''; document.getElementById('answer-input').focus();
}

function checkAns() {
    if (parseInt(document.getElementById('answer-input').value) === correctAnswer) {
        document.getElementById('math-ui').style.display = 'none';
        isMathActive = false; currentFish.destroy();
        score++; if (score >= 4) { door.setFillStyle(0x00ff00); }
    }
}

function makeFunny(scene, p) {
    p.isFunny = true; p.setScale(2); p.setTint(Math.random() * 0xffffff);
    scene.time.addEvent({ delay: 2000, callback: () => { p.setScale(1); p.clearTint(); p.isFunny = false; }});
}

// --- ציור דמויות ---
function drawPenguin(s) {
    let g = s.make.graphics(); g.fillStyle(0x000000); g.fillEllipse(15, 25, 30, 40);
    g.fillStyle(0xffffff); g.fillEllipse(15, 28, 20, 30);
    g.fillStyle(0xffa500); g.fillTriangle(12, 18, 18, 18, 15, 25);
    g.generateTexture('p1', 30, 50);
}
function drawTiger(s) {
    let g = s.make.graphics(); g.fillStyle(0xffa500); g.fillEllipse(15, 25, 30, 40);
    g.fillStyle(0x000000); g.fillRect(5, 15, 10, 2); g.fillRect(20, 25, 10, 2);
    g.generateTexture('p2', 30, 50);
}
function drawPanda(s) {
    let g = s.make.graphics(); g.fillStyle(0xffffff); g.fillCircle(15, 25, 15);
    g.fillStyle(0x000000); g.fillCircle(8, 15, 5); g.fillCircle(22, 15, 5); // אוזניים
    g.fillCircle(10, 22, 3); g.fillCircle(20, 22, 3); // עיניים
    g.generateTexture('p3', 30, 50);
}
function drawAlien(s) {
    let g = s.make.graphics(); g.fillStyle(0x00ff00); g.fillCircle(20, 20, 15);
    g.fillStyle(0xffffff); g.fillCircle(15, 15, 5); g.generateTexture('alienTex', 40, 40);
}
function drawFish(s) {
    let g = s.make.graphics(); g.fillStyle(0x3498db); g.fillEllipse(15, 10, 25, 15);
    g.generateTexture('fishTex', 30, 20);
}
function drawLadder(scene, x, y, h) {
    let g = scene.add.graphics(); g.fillStyle(0xcd853f); g.fillRect(0, 0, 40, h);
    for(let i=0; i<h; i+=20) { g.fillStyle(0x8b4513); g.fillRect(0, i, 40, 4); }
    let k = 'lad'+x+y; g.generateTexture(k, 40, h); ladders.create(x, y, k); g.destroy();
}
function createPlatform(x, y, w, h, color) {
    let g = game.scene.scenes[0].add.rectangle(x, y, w, h, color);
    game.scene.scenes[0].physics.add.existing(g, true); platforms.add(g);
}
function spawnFish(list) {
    list.forEach(p => { let f = fishGroup.create(p.x, p.y, 'fishTex'); f.body.allowGravity = false; });
}
function createAlien(x, y) {
    let a = aliens.create(x, y, 'alienTex'); a.setCollideWorldBounds(true); a.setVelocityX(150);
}
</script>
</body>
</html>
