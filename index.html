<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>הרפתקת החשבון המשתנה</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { border: 4px solid #555; border-radius: 12px; box-shadow: 0 0 40px rgba(0,255,255,0.2); }
        #math-ui {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffffff, #f0f0f0); padding: 30px; border-radius: 25px;
            text-align: center; display: none; border: 8px solid #4a69bd; z-index: 10; box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        #math-ui input { font-size: 35px; width: 120px; text-align: center; border: 4px solid #4a69bd; border-radius: 15px; }
    </style>
</head>
<body>

<div id="math-ui">
    <h2 id="question" style="font-size: 32px; color: #1e3799;">?</h2>
    <input type="number" id="answer-input" />
    <p style="font-weight: bold; color: #4a69bd;">תשובה + Enter</p>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800, height: 600,
    physics: { default: 'arcade', arcade: { gravity: { y: 900 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

let p1, p2, ball, aliens, fishGroup, platforms, ladders, door, cheerleader;
let score = 0, level = 1, isMathActive = false, currentFish = null, correctAnswer;
let cursors, keys;

const game = new Phaser.Game(config);

function preload() {}

function create() {
    this.cameras.main.setBackgroundColor('#0f0c29');
    
    // יצירת קבוצות
    platforms = this.physics.add.staticGroup();
    ladders = this.physics.add.staticGroup();
    aliens = this.physics.add.group();
    fishGroup = this.physics.add.group();

    drawEnhancedAssets(this);
    setupLevel(this);

    // שחקנים
    p1 = this.physics.add.sprite(60, 520, 'p1_tex').setCollideWorldBounds(true);
    p2 = this.physics.add.sprite(120, 520, 'p2_tex').setCollideWorldBounds(true);

    // מעודד
    cheerleader = this.add.sprite(40, 550, 'p1_tex').setScale(0.7).setTint(0x00ffff);
    this.tweens.add({ targets: cheerleader, y: 530, duration: 400, yoyo: true, repeat: -1 });

    // כדור וחייזרים
    ball = this.physics.add.sprite(400, 500, 'ball_tex').setBounce(0.9).setCollideWorldBounds(true).setDragX(60);
    createAlien(this, 300, 500);
    createAlien(this, 500, 500);

    // שליטה
    cursors = this.input.keyboard.createCursorKeys();
    keys = this.input.keyboard.addKeys('W,A,D');

    // התנגשויות
    this.physics.add.collider([p1, p2, aliens, ball], platforms);
    this.physics.add.overlap([p1, p2], fishGroup, (p, f) => { if (!isMathActive) startMath(f); }, null, this);
    this.physics.add.overlap([p1, p2], [aliens, ball], (p, t) => { if(!p.isFunny) makeFunny(this, p); }, null, this);
    
    this.physics.add.overlap([p1, p2], door, () => {
        if (score >= 4) {
            level++;
            alert("עוברים לשלב " + level + "!");
            score = 0;
            this.scene.restart();
        }
    }, null, this);

    document.getElementById('answer-input').onkeydown = (e) => { if (e.key === 'Enter') checkAns(); };
}

function update() {
    if (isMathActive) { p1.setVelocity(0); p2.setVelocity(0); return; }

    movePlayer(p1, cursors.left, cursors.right, cursors.up);
    movePlayer(p2, keys.A, keys.D, keys.W);

    aliens.children.iterate(a => {
        let dist = ball.x - a.x;
        a.setVelocityX(dist > 0 ? 150 : -150);
        if (Math.abs(dist) < 30) ball.setVelocityY(-250).setVelocityX(dist * 10);
    });
}

function setupLevel(scene) {
    // רצפה קבועה
    createPlatform(400, 585, 800, 30, 0x222f3e);

    // יצירת מדרגות וסולמות בצורה אקראית לפי השלב
    let heights = [450, 320, 180];
    heights.forEach((h, i) => {
        let xPos = (level % 2 === 0) ? (200 + i*100) : (600 - i*100);
        createPlatform(xPos, h, 300, 20, 0x576574);
        drawLadder(scene, xPos + (i%2==0 ? 100 : -100), h + 65, 130);
        
        // הוספת דג בכל קומה
        let f = fishGroup.create(xPos, h - 40, 'fish_tex');
        f.body.allowGravity = false;
    });

    // דג נוסף על הרצפה
    fishGroup.create(700, 540, 'fish_tex').body.allowGravity = false;

    // דלת
    door = scene.add.rectangle(750, 100, 60, 90, 0xff4757);
    scene.physics.add.existing(door, true);
    scene.add.text(725, 40, "יציאה", {fontSize:'14px', color:'#fff', fontStyle:'bold'});
}

function movePlayer(p, l, r, u) {
    p.body.allowGravity = true;
    if (l.isDown) { p.setVelocityX(-220); p.setFlipX(true); }
    else if (r.isDown) { p.setVelocityX(220); p.setFlipX(false); }
    else p.setVelocityX(0);

    game.scene.scenes[0].physics.overlap(p, ladders, () => {
        if (u.isDown) { p.setVelocityY(-200); p.body.allowGravity = false; }
    });
    if (u.isDown && p.body.touching.down) p.setVelocityY(-480);
}

function startMath(fish) {
    isMathActive = true; currentFish = fish;
    let n1 = Math.floor(Math.random() * 10) + level;
    let n2 = Math.floor(Math.random() * 9) + 1;
    correctAnswer = n1 + n2;
    document.getElementById('question').innerText = `כמה זה ${n1} + ${n2}?`;
    document.getElementById('math-ui').style.display = 'block';
    document.getElementById('answer-input').value = ''; document.getElementById('answer-input').focus();
}

function checkAns() {
    if (parseInt(document.getElementById('answer-input').value) === correctAnswer) {
        document.getElementById('math-ui').style.display = 'none';
        isMathActive = false; currentFish.destroy();
        score++; if (score >= 4) door.setFillStyle(0x2ed573);
    }
}

function makeFunny(scene, p) {
    p.isFunny = true; p.setScale(2); p.setAngle(15);
    scene.time.addEvent({ delay: 1500, callback: () => { p.setScale(1); p.setAngle(0); p.isFunny = false; }});
}

function drawEnhancedAssets(s) {
    // פינגווין משופר
    let g1 = s.make.graphics();
    g1.fillStyle(0x000000); g1.fillEllipse(15, 25, 30, 45); // גוף
    g1.fillStyle(0xffffff); g1.fillEllipse(15, 32, 22, 30); // בטן
    g1.fillStyle(0x000000); g1.fillCircle(10, 15, 4); g1.fillCircle(20, 15, 4); // עיניים
    g1.fillStyle(0xffa500); g1.fillTriangle(13, 18, 17, 18, 15, 25); // מקור
    g1.generateTexture('p1_tex', 30, 50);

    // נמר משופר
    let g2 = s.make.graphics();
    g2.fillStyle(0xff9f43); g2.fillEllipse(15, 25, 30, 45);
    g2.fillStyle(0x222222); // פסים עבים יותר
    for(let i=18; i<45; i+=10) { g2.fillRect(4, i, 8, 3); g2.fillRect(18, i+4, 8, 3); }
    g2.generateTexture('p2_tex', 30, 50);

    // כדורגל
    let gb = s.make.graphics();
    gb.fillStyle(0xffffff); gb.fillCircle(10, 10, 10);
    gb.fillStyle(0x000000); gb.fillCircle(10, 10, 4);
    gb.generateTexture('ball_tex', 20, 20);

    // דג
    let gf = s.make.graphics();
    gf.fillStyle(0x54a0ff); gf.fillEllipse(15, 10, 26, 16);
    gf.fillStyle(0x2e86de); gf.fillTriangle(0, 4, 0, 16, 10, 10);
    gf.generateTexture('fish_tex', 30, 20);

    // חייזר
    let ga = s.make.graphics();
    ga.fillStyle(0x1dd1a1); ga.fillCircle(20, 20, 18);
    ga.fillStyle(0xffffff); ga.fillCircle(20, 15, 10); // עין גדולה אחת
    ga.fillStyle(0x000000); ga.fillCircle(20, 15, 4);
    ga.generateTexture('alien_tex', 40, 40);
}

function drawLadder(scene, x, y, h) {
    let g = scene.add.graphics();
    g.lineStyle(4, 0xa39391);
    g.strokeLineShape(new Phaser.Geom.Line(5, 0, 5, h));
    g.strokeLineShape(new Phaser.Geom.Line(30, 0, 30, h));
    for(let i=10; i<h; i+=25) g.strokeLineShape(new Phaser.Geom.Line(5, i, 30, i));
    let k = 'lad'+x+y+level;
    g.generateTexture(k, 35, h);
    ladders.create(x, y, k);
    g.destroy();
}

function createPlatform(x, y, w, h, color) {
    let g = game.scene.scenes[0].add.rectangle(x, y, w, h, color);
    game.scene.scenes[0].physics.add.existing(g, true);
    platforms.add(g);
}

function createAlien(scene, x, y) {
    let a = aliens.create(x, y, 'alien_tex');
    a.setCollideWorldBounds(true).setBounce(0.3);
}
</script>
</body>
</html>
